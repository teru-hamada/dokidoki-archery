      bowGroup.userData.charge = 0;
      bowGroup.userData.drawAmount = 0;
      bowGroup.userData.releaseVelocity = 0;
      bowGroup.userData.stringVibration = 0;
      bowGroup.userData.bowKick = 0;
      bowGroup.userData.attachedArrow = null;
      bowGroup.userData.arrowAttach = arrowAttach;

      // --------------------------------------------------
      // ノックを接続点へ合わせる
      // --------------------------------------------------
      function placeArrowByNock(arrow, attachPos) {
        if (!arrow) return;

        const nockToCenter = arrow.userData?.nockToCenter ?? 0.475;
        const forward = new THREE.Vector3(1, 0, 0)
          .applyQuaternion(arrow.quaternion)
          .normalize();

        arrow.position.copy(
          attachPos.clone().addScaledVector(forward, nockToCenter)
        );
      }

      // --------------------------------------------------
      // 弓形状再構築
      // --------------------------------------------------
      function rebuildBow(draw = 0, kick = 0) {
        const stringLocals = getStringLocals(draw, kick);

        const upperCurve = createUpperLimbCurve(draw, kick, stringLocals);
        const lowerCurve = createLowerLimbCurve(draw, kick, stringLocals);

        const upperGeo = createTaperedLimbGeometry(upperCurve);
        const lowerGeo = createTaperedLimbGeometry(lowerCurve);

        upperLimbMesh.geometry.dispose();
        lowerLimbMesh.geometry.dispose();

        upperLimbMesh.geometry = upperGeo;
        lowerLimbMesh.geometry = lowerGeo;

        updateTipTransform(upperTip, upperCurve, true);
        updateTipTransform(lowerTip, lowerCurve, false);

        return stringLocals;
      }

      // --------------------------------------------------
      // 弦更新
      // --------------------------------------------------
      function updateString(draw = 0, kick = 0, vibePhase = 0, vibeAmp = 0, stringLocals = null) {
        const locals = stringLocals ?? getStringLocals(draw, kick);

        const top = toWorld(locals.topLocal);
        const mid = toWorld(
          locals.midLocal.clone().add(
            new THREE.Vector3(0, 0, Math.sin(vibePhase) * vibeAmp)
          )
        );
        const bot = toWorld(locals.botLocal);

        const pos = string.geometry.attributes.position;
        pos.setXYZ(0, top.x, top.y, top.z);
        pos.setXYZ(1, mid.x, mid.y, mid.z);
        pos.setXYZ(2, bot.x, bot.y, bot.z);
        pos.needsUpdate = true;

        arrowAttach.position.copy(mid);

        const arrow = bowGroup.userData.attachedArrow;
        if (arrow) {
          placeArrowByNock(arrow, mid);
        }
      }

      // --------------------------------------------------
      // チャージ
      // --------------------------------------------------
      bowGroup.userData.setCharge = function (value) {
        const c = THREE.MathUtils.clamp(value, 0, 1);
        bowGroup.userData.charge = c;
        bowGroup.userData.drawAmount = c;

        const stringLocals = rebuildBow(c, 0);
        updateString(c, 0, 0, 0, stringLocals);
      };

      // --------------------------------------------------
      // 矢接続
      // --------------------------------------------------
      bowGroup.userData.attachArrow = function (arrow) {
        bowGroup.userData.attachedArrow = arrow;
        if (!arrow) return;

        placeArrowByNock(arrow, arrowAttach.position);
      };

      // --------------------------------------------------
      // リリース
      // --------------------------------------------------
      bowGroup.userData.releaseString = function () {
        const power = bowGroup.userData.drawAmount;

        bowGroup.userData.releaseVelocity = Math.max(0.22, power * 0.52);
        bowGroup.userData.stringVibration = 0.024 + power * 0.040;
        bowGroup.userData.bowKick = 0.60 + power * 0.72;
        bowGroup.userData.charge = 0;
      };

      // --------------------------------------------------
      // 毎フレーム更新
      // --------------------------------------------------
      bowGroup.userData.updateBowAnimation = function (dt, elapsed) {
        if (bowGroup.userData.drawAmount > 0) {
          bowGroup.userData.drawAmount -= bowGroup.userData.releaseVelocity * dt * 5.4;
          if (bowGroup.userData.drawAmount < 0) {
            bowGroup.userData.drawAmount = 0;
          }
        }

        bowGroup.userData.stringVibration *= Math.exp(-dt * 11.0);
        bowGroup.userData.bowKick *= Math.exp(-dt * 9.0);

        const kick = Math.sin(elapsed * 26.0) * bowGroup.userData.bowKick * 0.055;

        const stringLocals = rebuildBow(bowGroup.userData.drawAmount, kick);
        updateString(
          bowGroup.userData.drawAmount,
          kick,
          elapsed * 64.0,
          bowGroup.userData.stringVibration,
          stringLocals
        );
      };

      // 初期状態
      {
        const stringLocals = rebuildBow(0, 0);
        updateString(0, 0, 0, 0, stringLocals);
      }

      return bowGroup;
    }
  
    // ============================================================
    // Arrow: 矢モデル生成
    // ------------------------------------------------------------
    // この矢モデルは「+X方向に矢じりが向く」基準で作る。
    // そうすると、後で進行方向へ回すのが簡単になる。
    // ============================================================
    function createArrowModel() {
      const group = new THREE.Group();

      // 軸（細め）
      const shaftRadius = 0.012;
      const shaft = new THREE.Mesh(
        new THREE.CylinderGeometry(shaftRadius, shaftRadius, 0.95, 12),
        new THREE.MeshStandardMaterial({
          color: 0x2f2f2f,
          roughness: 0.82
        })
      );
      shaft.rotation.z = -Math.PI / 2;
      group.add(shaft);

      // 矢じり
      const tip = new THREE.Mesh(
        // 円錐の底面の半径,高さ, 円周分割数
        new THREE.ConeGeometry(shaftRadius, 0.05, 30),
        new THREE.MeshStandardMaterial({
          color: 0x8d8d8d,
          roughness: 0.35
        })
      );
      tip.rotation.z = -Math.PI / 2;
      tip.position.x = 0.95 / 2 + 0.025;
      group.add(tip);

      // 羽根材質
      const featherBaseMat = new THREE.MeshStandardMaterial({
        color: 0xf28c28,
        roughness: 0.88,
        side: THREE.DoubleSide
      });

      // 羽の取り付け位置（後方）
      const featherX = -0.95 / 2 + 0.13;

      // ------------------------------------------------------------
      // 羽形状
      // ------------------------------------------------------------
      // ローカル座標で
      // - X: 矢の進行方向
      // - Y: 軸から外側へ立ち上がる方向
      // - Z: 羽の薄み
      //
      // y = 0 の下辺（最長辺）が「軸に接着される辺」
      // になるように形状を作る
      // ------------------------------------------------------------
      function createVaneGeometry() {
        const shape = new THREE.Shape();

        // 最長辺（接地辺）
        shape.moveTo(-0.060, 0.000);
        shape.lineTo( 0.082, 0.000);

        // 上側輪郭
        shape.lineTo( 0.088, 0.010);
        shape.lineTo( 0.078, 0.030);
        shape.lineTo( 0.058, 0.046);
        shape.lineTo( 0.028, 0.056);
        shape.lineTo(-0.004, 0.043);
        shape.lineTo(-0.028, 0.026);
        shape.lineTo(-0.046, 0.012);
        shape.lineTo(-0.060, 0.000);
        shape.closePath();

        const geom = new THREE.ExtrudeGeometry(shape, {
          depth: 0.0012,
          bevelEnabled: false
        });

        // 薄み方向の中心を原点へ
        geom.translate(0, 0, -0.0006);

        return geom;
      }

      const featherGeom = createVaneGeometry();

      // 接着面を少しだけ軸の外へ逃がしてZ-fightingを防ぐ
      const contactLift = 0.0002;

      function createFeather(radialAngle, color) {
        const mat = featherBaseMat.clone();
        mat.color.setHex(color);

        const feather = new THREE.Mesh(featherGeom, mat);

        // 羽の前後を反転
        feather.scale.x = -1;

        // 軸周りに回転
        feather.rotation.x = radialAngle;

        // y=0 の最長辺全体が軸に接するように配置
        feather.position.set(
          featherX,
          Math.cos(radialAngle) * (shaftRadius + contactLift),
          Math.sin(radialAngle) * (shaftRadius + contactLift)
        );

        return feather;
      }

      // 4枚の薄い羽
      const f1 = createFeather(0,             0xf28c28);
      const f2 = createFeather(Math.PI / 2,   0xffffff);
      const f3 = createFeather(Math.PI,       0xf28c28);
      const f4 = createFeather(Math.PI * 1.5, 0xffffff);

      group.add(f1, f2, f3, f4);

      // ノック（矢の最後方）からグループ中心までの距離
      // 軸長 0.95 の半分を基準にしている
      group.userData.nockToCenter = 0.475;

      return group;
    }

    // ============================================================
    // Input
    // ============================================================
    function setupInput() {
      // --------------------------------------------------
      // PC: 左クリック
      // --------------------------------------------------
      window.addEventListener("mousedown", (e) => {
        if (isTouchDevice) return;
        if (e.button !== 0) return;

        // インパクトで止まっている状態で再度クリックしたらカメラリターン（１秒フリーズ）
        if (
          game.followArrow &&
          game.isHoldingOnImpact &&
          game.impactHoldTime >= 1.0
        ) {
          startCameraReturn();
          return;
        }

        beginCharge();
      });

      window.addEventListener("mouseup", (e) => {
        if (isTouchDevice) return;
        if (e.button !== 0) return;

        releaseArrow();
      });

      // --------------------------------------------------
      // スマホ: タッチ
      // 1本指でドラッグしながら照準、
      // 押している間チャージ、離すと発射
      // --------------------------------------------------
      window.addEventListener("touchstart", (e) => {
        if (!isTouchDevice) return;
        if (e.touches.length !== 1) return;

        e.preventDefault();

        const touch = e.touches[0];

        if (
          game.followArrow &&
          game.isHoldingOnImpact &&
          game.impactHoldTime >= 1.0
        ) {
          startCameraReturn();
          return;
        }

        game.touchLook.active = true;
        game.touchLook.lastX = touch.clientX;
        game.touchLook.lastY = touch.clientY;

        beginCharge();
      }, { passive: false });

      window.addEventListener("touchmove", (e) => {
        if (!isTouchDevice) return;
        if (!game.touchLook.active) return;
        if (e.touches.length !== 1) return;

        e.preventDefault();

        const touch = e.touches[0];
        const dx = touch.clientX - game.touchLook.lastX;
        const dy = touch.clientY - game.touchLook.lastY;

        game.touchLook.lastX = touch.clientX;
        game.touchLook.lastY = touch.clientY;

        updateTouchLook(dx, dy);
      }, { passive: false });

      window.addEventListener("touchend", (e) => {
        if (!isTouchDevice) return;

        e.preventDefault();
        game.touchLook.active = false;

        releaseArrow();
      }, { passive: false });

      window.addEventListener("touchcancel", (e) => {
        if (!isTouchDevice) return;

        e.preventDefault();
        game.touchLook.active = false;
        game.isCharging = false;
        game.chargeTime = 0;
        updateBowDraw(0);
        updateHUD();
      }, { passive: false });
    }

    function setupResize() {
      window.addEventListener("resize", () => {
        game.camera.aspect = window.innerWidth / window.innerHeight;
        game.camera.updateProjectionMatrix();
        applyResponsiveBowLayout();
      });
    }

    // ============================================================
    // チャージ / 発射 / リロード
    // ============================================================
    function beginCharge() {
      if (game.isGameOver) return;
      if (!isTouchDevice && !game.controls.isLocked) return;
      if (isTouchDevice && !game.hasStarted) return;
      if (isCameraInCinematicMode()) return;
      if (!game.hasLoadedArrow) return;

      game.isCharging = true;
      game.chargeTime = 0;
    }

    function getLaunchDirection() {
      const dir = new THREE.Vector3();
      game.camera.getWorldDirection(dir);

      // 上下角を少しだけ反映
      // 完全にカメラ通りにすると変化が強すぎるので弱める
      dir.y *= 0.35;

      // 真上/真下に近づきすぎないように軽く制限
      dir.y = THREE.MathUtils.clamp(dir.y, -0.22, 0.22);

      return dir.normalize();
    }

    function getWindAccelerationWithJitter(elapsed) {
      const base = getWindAcceleration().clone();

      // 風速が 0 に近い時はそのまま
      if (base.lengthSq() < 1e-8) return base;

      // 左右風に対して、ごく弱い上下揺らぎを足す
      const vertical =
        Math.sin(elapsed * 1.9) * 0.10 +
        Math.sin(elapsed * 3.7 + 1.2) * 0.05;

      // 風の強さ自体も少しだけ脈動させる
      const gust = 1.0 +
        Math.sin(elapsed * 1.4 + 0.6) * 0.10 +
        Math.sin(elapsed * 2.8 + 2.1) * 0.05;

      base.multiplyScalar(gust);
      base.y += vertical * game.windAccelerationScale;

      return base;
    }

    function releaseArrow() {
      if (!game.isCharging) return;

      game.isCharging = false;

      if (!game.hasLoadedArrow || !game.loadedArrow) return;

      const chargeRatio = THREE.MathUtils.clamp(
        game.chargeTime / game.maxChargeTime,
        0,
        1
      );

      const speed = THREE.MathUtils.lerp(
        game.minSpeed,
        game.maxSpeed,
        chargeRatio
      );

      // まずは従来どおり水平ベースの前方方向を使う
      const horizontalDir = getHorizontalForward();

      // そこへ少しだけ上向き補正を加える
      const launchDir = horizontalDir.clone();
      launchDir.y += DEFAULT_ARROW_PITCH_BIAS;
      launchDir.normalize();

      const arrow = createArrowModel();
      arrow.position.copy(getMuzzlePosition());

      // 矢の向きも launchDir に合わせる
      orientArrowToDirection(arrow, launchDir);

      game.scene.add(arrow);

      const velocity = launchDir.clone().multiplyScalar(speed);

      // 既存の上向き速度は維持
      velocity.y += 1.5 + 2.3 * chargeRatio;

      const arrowData = {
        mesh: arrow,
        velocity,
        age: 0,
        horizontalDir: launchDir.clone(),
        stuck: false
      };

      game.flyingArrows.push(arrowData);
      startArrowFollow(arrowData);

      game.hasLoadedArrow = false;
      game.chargeTime = 0;
      updateLoadedArrowVisual();

      game.shots++;
      updateHUD();
    }

    function reloadArrow() {
      if (game.isGameOver) return;

      game.hasLoadedArrow = true;
      game.isCharging = false;
      game.chargeTime = 0;
    
      // リロードのたびに風速だけ変える
      randomizeWindSpeedOnly();
  
      updateLoadedArrowVisual();
      updateBowDraw(0);
      updateHUD();
    }

    // ============================================================
    // 手元の弓矢の見た目更新
    // ============================================================
    function updateLoadedArrowVisual() {
      if (!game.loadedArrow) return;

      game.loadedArrow.visible = game.hasLoadedArrow;

      const bowGroup = game.bowRoot?.children?.[0];

      if (!game.hasLoadedArrow) {
        if (bowGroup?.userData) {
          bowGroup.userData.attachedArrow = null;
        }
        return;
      }

      const shaftDir = new THREE.Vector3(0, 0, -1)
        .applyEuler(new THREE.Euler(
          -0.03,  // X: 少し上向き/下向き
          -0.10,  // Y: 左右の基本向き
           0.00,  // Z: ひねり
          "XYZ"
        ))
        .normalize();

      orientArrowToDirection(game.loadedArrow, shaftDir);

      // 再装填時も必ず弓へ再接続する
      if (bowGroup?.userData?.attachArrow) {
         bowGroup.userData.attachArrow(game.loadedArrow);
      }

    }
    function orientArrowToDirection(arrow, dir) {
      // この矢モデルは +X が先端方向
      const from = new THREE.Vector3(1, 0, 0);
      const to = dir.clone().normalize();

      if (to.lengthSq() < 1e-8) return;

      const q = new THREE.Quaternion().setFromUnitVectors(from, to);
      arrow.quaternion.copy(q);
    }

    function updateBowDraw(ratio) {
      const drawRatio = THREE.MathUtils.clamp(ratio, 0, 1);

      const bowGroup = game.bowRoot?.children?.[0];
      if (bowGroup?.userData?.setCharge) {
        bowGroup.userData.setCharge(drawRatio);
      }
    }

    // ============================================================
    // 方向・姿勢
    // ============================================================
    function getHorizontalForward() {
      const dir = new THREE.Vector3(0, 0, -1);
      dir.applyQuaternion(game.camera.quaternion);

      // 水平成分だけ使う
      dir.y = 0;

      // 真上/真下近くを向いた時の保険
      if (dir.lengthSq() < 1e-6) {
        dir.set(0, 0, -1);
      }

      dir.normalize();
      return dir;
    }

    function getMuzzlePosition() {
      const pos = new THREE.Vector3();
      game.camera.getWorldPosition(pos);

      // 画面中央から少し前へ
      const forward = new THREE.Vector3(0, 0, -1)
        .applyQuaternion(game.camera.quaternion)
        .normalize();

      pos.addScaledVector(forward, 0.85);
  
      // ほんの少し下げて視認性を上げる
      pos.y -= 0.05;

      return pos;
    }

    function getCurrentWindDirection() {
      return WIND_DIRECTIONS[game.wind.directionIndex] || WIND_DIRECTIONS[0];
    }

    function getWindAcceleration() {
      return getCurrentWindDirection().vector
        .clone()
        .multiplyScalar(game.wind.speed * game.windAccelerationScale);
    }

    function randomizeWind() {
      game.wind.directionIndex = Math.floor(Math.random() * WIND_DIRECTIONS.length);
      game.wind.speed = THREE.MathUtils.lerp(1.5, 7.0, Math.random());
    }

    // 向きはそのままで風速だけ変える
    function randomizeWindSpeedOnly() {
      game.wind.speed = THREE.MathUtils.lerp(1.5, 7.0, Math.random());
    }

    function orientArrowHorizontally(arrow, horizontalDir) {
      // この矢モデルは +X が先端方向
      const from = new THREE.Vector3(1, 0, 0);
      const to = horizontalDir.clone().normalize();

      const q = new THREE.Quaternion().setFromUnitVectors(from, to);
      arrow.quaternion.copy(q);
    }

    function updateTouchLook(dx, dy) {
      if (!isTouchDevice) return;
      if (game.isGameOver) return;
      if (isCameraInCinematicMode()) return;

      game.touchLook.yaw -= dx * game.touchLook.sensitivityX;
      game.touchLook.pitch -= dy * game.touchLook.sensitivityY;

      game.touchLook.pitch = THREE.MathUtils.clamp(
        game.touchLook.pitch,
        -Math.PI / 3,
        Math.PI / 3
      );

      game.camera.rotation.order = "YXZ";
      game.camera.rotation.y = game.touchLook.yaw;
      game.camera.rotation.x = game.touchLook.pitch;
    }

    function isCameraInCinematicMode() {
      return !!game.followArrow || game.isHoldingOnImpact || game.isReturningCamera;
    }

    function startArrowFollow(arrowData) {
      game.savedCameraPosition.copy(game.camera.position);
      game.savedCameraQuaternion.copy(game.camera.quaternion);
      game.followArrow = arrowData;
      game.isHoldingOnImpact = false;
      game.isReturningCamera = false;
      game.impactHoldTime = 0;

      if (game.bowRoot) {
        game.bowRoot.visible = false;
      }
    }

    function startImpactHold() {
      if (!game.followArrow || game.isHoldingOnImpact) return;

      game.isHoldingOnImpact = true;
      game.impactHoldTime = 0;
    }

    function startCameraReturn() {
      if (!isCameraInCinematicMode()) return;

      game.followArrow = null;
      game.isHoldingOnImpact = false;
      game.isReturningCamera = true;
      game.impactHoldTime = 0;
    }

    function finishCameraReturn() {
      game.camera.position.copy(game.savedCameraPosition);

      // 視点を正面（デフォルト）にリセット
      game.camera.rotation.set(0, 0, 0, "YXZ");
      game.camera.quaternion.setFromEuler(game.camera.rotation);

      // タッチ用の yaw/pitch もリセット
      game.touchLook.yaw = 0;
      game.touchLook.pitch = 0;

      game.followArrow = null;
      game.isHoldingOnImpact = false;
      game.isReturningCamera = false;
      game.impactHoldTime = 0;

      if (game.bowRoot) {
        game.bowRoot.visible = true;
      }

      reloadArrow();
    }

    function updateCameraFollow(dt) {
      if (game.followArrow) {
        const arrowData = game.followArrow;

        if (!arrowData.mesh.parent) {
          startCameraReturn();
          return;
        }

        const followDir = arrowData.horizontalDir.clone().normalize();
        const targetPosition = arrowData.mesh.position.clone()
          .addScaledVector(followDir, -game.followOffsetDistance);
        targetPosition.y += game.followOffsetHeight;

        const followAlpha = 1 - Math.exp(-game.followLerpSpeed * dt);
        game.camera.position.lerp(targetPosition, followAlpha);

        const lookTarget = arrowData.mesh.position.clone()
          .addScaledVector(followDir, game.followLookAhead);
        const lookMatrix = new THREE.Matrix4().lookAt(
          game.camera.position,
          lookTarget,
          game.camera.up
        );
        const targetQuaternion = new THREE.Quaternion().setFromRotationMatrix(lookMatrix);
        game.camera.quaternion.slerp(targetQuaternion, followAlpha);

        if (arrowData.stuck) {
          startImpactHold();
          game.impactHoldTime += dt;
        }
        return;
      }

      if (!game.isReturningCamera) {
        if (game.bowRoot) {
          game.bowRoot.visible = true;
        }
        return;
      }

      const returnAlpha = 1 - Math.exp(-game.returnLerpSpeed * dt);
      game.camera.position.lerp(game.savedCameraPosition, returnAlpha);
      game.camera.quaternion.slerp(game.savedCameraQuaternion, returnAlpha);

      if (
        game.camera.position.distanceToSquared(game.savedCameraPosition) < 1e-4 &&
        game.camera.quaternion.angleTo(game.savedCameraQuaternion) < 0.01
      ) {
        finishCameraReturn();
      }
    }

    // ============================================================
    // 当たり判定 / スコア
    // ============================================================
    function checkTargetHit(prevPos, nextPos) {
      const center = game.targetFace.getWorldPosition(new THREE.Vector3());

      // 的の法線
      const normal = new THREE.Vector3(0, 0, 1)
        .applyQuaternion(game.targetFace.getWorldQuaternion(new THREE.Quaternion()))
        .normalize();

      const d1 = prevPos.clone().sub(center).dot(normal);
      const d2 = nextPos.clone().sub(center).dot(normal);

      // 平面を跨いでいなければヒットしない
      if (d1 * d2 > 0) return null;

      const t = d1 / (d1 - d2);
      if (t < 0 || t > 1) return null;

      const hitPos = prevPos.clone().lerp(nextPos, t);

      const offset = hitPos.clone().sub(center);
      const planar = offset.sub(normal.clone().multiplyScalar(offset.dot(normal)));
      const dist = planar.length();

      if (dist <= game.targetRadius) {
        return { hitPos, dist };
      }

      return null;
    }

    function scoreFromDistance(dist) {
      const normalized = 1 - dist / game.targetRadius;
      return Math.max(1, Math.round(normalized * 10));
    }

    function triggerHitCelebration() {
      if (!celebrationLayer) return;

      while (celebrationLayer.childElementCount >= MAX_ACTIVE_CONFETTI_BURSTS) {
        celebrationLayer.firstElementChild?.remove();
      }

      const burst = document.createElement("div");
      burst.className = "confetti-burst";

      let maxLifetimeMs = 0;

      for (let i = 0; i < CONFETTI_PIECES_PER_HIT; i++) {
        const piece = document.createElement("span");
        piece.className = "confetti-piece";

        const width = 8 + Math.random() * 8;
        const height = 12 + Math.random() * 12;
        const durationMs = 2400 + Math.random() * 1300;
        const delayMs = Math.random() * 180;
        const driftX = -18 + Math.random() * 36;
        const fallDistance = 85 + Math.random() * 30;
        const rotateStart = -160 + Math.random() * 320;
        const rotateEnd = rotateStart + (Math.random() < 0.5 ? -1 : 1) * (540 + Math.random() * 540);
        const left = Math.random() * 100;
        const color = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];

        piece.style.setProperty("--confetti-width", `${width.toFixed(1)}px`);
        piece.style.setProperty("--confetti-height", `${height.toFixed(1)}px`);
        piece.style.setProperty("--confetti-left", `${left.toFixed(2)}vw`);
        piece.style.setProperty("--confetti-color", color);
        piece.style.setProperty("--confetti-duration", `${durationMs.toFixed(0)}ms`);
        piece.style.setProperty("--confetti-delay", `${delayMs.toFixed(0)}ms`);
        piece.style.setProperty("--confetti-drift-x", `${driftX.toFixed(2)}vw`);
        piece.style.setProperty("--confetti-fall-distance", `${fallDistance.toFixed(2)}vh`);
        piece.style.setProperty("--confetti-rotate-start", `${rotateStart.toFixed(1)}deg`);
        piece.style.setProperty("--confetti-rotate-end", `${rotateEnd.toFixed(1)}deg`);

        burst.appendChild(piece);
        maxLifetimeMs = Math.max(maxLifetimeMs, durationMs + delayMs);
      }

      celebrationLayer.appendChild(burst);
      window.setTimeout(() => burst.remove(), maxLifetimeMs + 120);
    }

    function startGame() {
      randomizeWind();
      game.hasStarted = true;
      game.timeRemaining = game.timeLimit;
      updateHUD();
    }

    // ============================================================
    // スコア送信（PowerShell連携）
    // ※失敗しても絶対にエラーにしない
    // ============================================================
    async function sendScoreToExternal(score) {
      if (!ENABLE_SCORE_POST) return;

      try {
        await fetch(SCORE_POST_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            score: score,
            timestamp: new Date().toISOString()
          })
        });
      } catch (e) {
        // ★重要：完全に無視（エラーにしない）
        console.warn("スコア送信失敗（無視）", e);
      }
    }

    function endGame() {
      if (game.isGameOver) return;

      game.isGameOver = true;
      game.timeRemaining = 0;
      game.isCharging = false;
      game.chargeTime = 0;
      finishCameraReturn();
      overlay.classList.add("hidden");
      const isCelebration = game.score >= 11;
      gameOverScreen.textContent =
        isCelebration ? "CONGRATULATIONS!!" : "GAME OVER";
      gameOverScreen.classList.toggle("isCelebration", isCelebration);
      gameOverScreen.classList.add("visible");

      updateBowDraw(0);
      updateLoadedArrowVisual();
      updateHUD();

      if (game.controls.isLocked) {
        game.controls.unlock();
      }

      // スコア送信（非同期・失敗しても無視）
      sendScoreToExternal(game.score);
    }

    function updateTimer(dt) {
      if (!game.hasStarted || game.isGameOver) return;

      game.timeRemaining = Math.max(0, game.timeRemaining - dt);

      if (game.timeRemaining <= 0) {
        endGame();
      }
    }

    function formatTimeRemaining(seconds) {
      return `${Math.max(0, Math.ceil(seconds))}s`;
    }

    // ============================================================
    // HUD
    // ============================================================
    function updateHUD() {
      const ratio = THREE.MathUtils.clamp(game.chargeTime / game.maxChargeTime, 0, 1);
      const percent = Math.round(ratio * 100);
      const windDirection = getCurrentWindDirection();
      const windText = game.hasStarted
        ? `${windDirection.symbol}  ${game.wind.speed.toFixed(1)} m/s`
        : "-";

      hudText.innerHTML = `
        <div><span class="hudLabel">スコア</span>: <b>${game.score}点（${game.shots}ショット中${game.hits}本命中）</b></div>
        <div><span class="hudLabel">残り時間</span>: <b>${formatTimeRemaining(game.timeRemaining)}</b></div>
        <div><span class="hudLabel">風速</span>: <b>${windText}</b></div>
        <div class="powerRow">
          <div class="powerLabel"><span class="hudLabel">パワー</span>:</div>
          <div id="chargeWrap">
            <div id="chargeBar" style="width: ${game.isCharging ? percent : 0}%;"></div>
            <div id="chargeText">${game.isCharging ? percent + "%" : "0%"}</div>
          </div>
        </div>
      `;
    }

    // ============================================================
    // 更新
    // ============================================================
    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(0.033, game.clock.getDelta());
      const elapsed = game.clock.elapsedTime;

      if (!game.isGameOver) {

        // 実装済みの弓アニメーションを毎フレーム呼ぶ
        if (game.bowRoot?.children?.[0]?.userData?.updateBowAnimation) {
            game.bowRoot.children[0].userData.updateBowAnimation(dt, elapsed);
        }
        updateCharge(dt);
        updateFlyingArrows(dt);
        updateCameraFollow(dt);
        updateTimer(dt);
      }

      updateWindFX(dt, elapsed);
      updateHUD();

      game.renderer.render(game.scene, game.camera);
    }

    function updateCharge(dt) {
      if (!game.isCharging) return;

      game.chargeTime = Math.min(game.maxChargeTime, game.chargeTime + dt);

      const ratio = game.chargeTime / game.maxChargeTime;
      updateBowDraw(ratio);
    }

    function updateFlyingArrows(dt) {
      for (let i = game.flyingArrows.length - 1; i >= 0; i--) {
        const arrowData = game.flyingArrows[i];

        if (arrowData.stuck) continue;

        arrowData.age += dt;

        // 長く飛びすぎた矢は削除
        if (arrowData.age > game.maxLifetime) {
          game.scene.remove(arrowData.mesh);
          game.flyingArrows.splice(i, 1);
          continue;
        }

        const prevPos = arrowData.mesh.position.clone();

        // 重力・風
        arrowData.velocity.addScaledVector(game.gravity, dt);
        arrowData.velocity.addScaledVector(
          getWindAccelerationWithJitter(game.clock.elapsedTime),
          dt
        );

        // 位置更新
        arrowData.mesh.position.addScaledVector(arrowData.velocity, dt);

        const nextPos = arrowData.mesh.position.clone();

        // 進行方向そのものへ向ける
        if (arrowData.velocity.lengthSq() > 1e-6) {
          orientArrowToDirection(arrowData.mesh, arrowData.velocity);
        }

        // 地面に落ちたら停止
        if (arrowData.mesh.position.y <= 0.05) {
          arrowData.mesh.position.y = 0.05;
          arrowData.velocity.set(0, 0, 0);
          arrowData.stuck = true;
          continue;
        }

        // 的ヒット判定
        const hit = checkTargetHit(prevPos, nextPos);
        if (hit) {
          arrowData.mesh.position.copy(hit.hitPos);
          arrowData.velocity.set(0, 0, 0);
          arrowData.stuck = true;

          game.hits++;
          game.score += scoreFromDistance(hit.dist);
          triggerHitCelebration();
        }
      }
    }
  </script>
</body>
