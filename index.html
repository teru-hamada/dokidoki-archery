<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ドキドキアーチェリー</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #87ceeb;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    #hud {
      position: fixed;
      left: 12px;
      top: 12px;
      z-index: 20;
      min-width: 290px;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.45);
      color: #fff;
      line-height: 1.55;
      user-select: none;
      box-shadow: 0 8px 24px rgba(0,0,0,.18);
    }

    #chargeWrap {
      margin-top: 8px;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255,255,255,.16);
      border: 1px solid rgba(255,255,255,.2);
    }

    #chargeBar {
      width: 0%;
      height: 100%;
      background: rgba(255,255,255,.92);
      transition: width 0.03s linear;
    }

    #crosshair {
      position: fixed;
      left: 50%;
      top: 50%;
      width: 18px;
      height: 18px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 20;
      filter: drop-shadow(0 1px 1px rgba(0,0,0,.35));
    }

    #crosshair::before,
    #crosshair::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255,255,255,.96);
      border-radius: 2px;
    }

    #crosshair::before { width: 18px; height: 2px; }
    #crosshair::after  { width: 2px;  height: 18px; }

    #overlay {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(0,0,0,.55);
      color: #fff;
      z-index: 30;
      text-align: center;
      padding: 20px;
    }

    #overlay.hidden {
      display: none;
    }

    #gameOverScreen {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      z-index: 40;
      pointer-events: none;
      color: #fff;
      font-size: clamp(48px, 10vw, 120px);
      font-weight: 800;
      letter-spacing: 0.12em;
      text-shadow: 0 10px 28px rgba(0, 0, 0, 0.45);
    }

    #gameOverScreen.visible {
      display: grid;
    }

    #gameOverScreen.isCelebration {
      color: #f7fbff;
      text-shadow:
        0 0 10px rgba(180, 242, 255, 0.95),
        0 0 22px rgba(90, 210, 255, 0.8),
        0 0 42px rgba(76, 146, 255, 0.68),
        0 0 64px rgba(185, 120, 255, 0.42),
        0 10px 28px rgba(0, 0, 0, 0.32);
      animation: congratulations-neon 2.2s ease-in-out infinite alternate;
    }

    #celebrationLayer {
      position: fixed;
      inset: 0;
      z-index: 15;
      overflow: hidden;
      pointer-events: none;
    }

    .confetti-burst {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .confetti-piece {
      position: absolute;
      top: -18vh;
      width: var(--confetti-width, 10px);
      height: var(--confetti-height, 18px);
      left: var(--confetti-left, 50vw);
      opacity: 0;
      border-radius: 2px;
      background:
        linear-gradient(
          135deg,
          rgba(255,255,255,0.85) 0%,
          rgba(255,255,255,0.18) 28%,
          var(--confetti-color, #ffffff) 28%,
          var(--confetti-color, #ffffff) 100%
        );
      box-shadow: 0 0 10px rgba(255,255,255,0.25);
      animation: confetti-fall var(--confetti-duration, 3s) ease-out var(--confetti-delay, 0s) forwards;
      transform: translate3d(0, 0, 0) rotate(var(--confetti-rotate-start, 0deg));
      transform-origin: center;
      will-change: transform, opacity;
    }

    @keyframes confetti-fall {
      0% {
        opacity: 0;
        transform: translate3d(0, -10vh, 0) rotate(var(--confetti-rotate-start, 0deg)) scale(0.8);
      }

      12% {
        opacity: 1;
      }

      100% {
        opacity: 0;
        transform:
          translate3d(var(--confetti-drift-x, 0vw), var(--confetti-fall-distance, 110vh), 0)
          rotate(var(--confetti-rotate-end, 540deg))
          scale(1.05);
      }
    }

    @keyframes congratulations-neon {
      0% {
        text-shadow:
          0 0 8px rgba(180, 242, 255, 0.8),
          0 0 16px rgba(90, 210, 255, 0.62),
          0 0 30px rgba(76, 146, 255, 0.5),
          0 0 48px rgba(185, 120, 255, 0.28),
          0 10px 28px rgba(0, 0, 0, 0.32);
      }

      100% {
        text-shadow:
          0 0 12px rgba(205, 248, 255, 1),
          0 0 26px rgba(120, 224, 255, 0.88),
          0 0 48px rgba(89, 170, 255, 0.72),
          0 0 72px rgba(198, 132, 255, 0.42),
          0 10px 28px rgba(0, 0, 0, 0.32);
      }
    }

    .card {
      max-width: 780px;
      padding: 20px;
      border-radius: 18px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(8px);
    }

    .overlayStack {
      display: grid;
      justify-items: center;
      gap: 16px;
    }

    .overlayTitle {
      padding: 14px 28px 18px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(71,142,230,.96) 0%, rgba(33,94,184,.96) 50%, rgba(17,65,143,.96) 100%);
      border: 1px solid rgba(255,255,255,.28);
      box-shadow:
        0 12px 24px rgba(0,0,0,.28),
        inset 0 1px 0 rgba(255,255,255,.45),
        inset 0 -2px 0 rgba(10,41,96,.55);
    }

    .overlayTitle h1 {
      margin: 0;
      font-size: clamp(36px, 6vw, 56px);
      line-height: 1.05;
      letter-spacing: .08em;
      color: #f7fbff;
      text-shadow:
        0 1px 0 #dcecff,
        0 2px 0 #b8d8ff,
        0 3px 0 #8bb6f2,
        0 4px 0 #4d80d2,
        0 10px 18px rgba(0,0,0,.34);
    }

    .card p {
      margin: 8px 0;
      opacity: .96;
    }

    .kbd {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 8px;
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.2);
    }

    #errorBox {
      margin-top: 12px;
      text-align: left;
      white-space: pre-wrap;
      padding: 10px;
      border-radius: 10px;
      background: rgba(0,0,0,.3);
      border: 1px solid rgba(255,255,255,.15);
      display: none;
      font-size: 12px;
    }
  </style>

  <!-- import map で "three" の参照先を明示 -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="hud">
    <div id="hudText"></div>
    <div id="chargeWrap"><div id="chargeBar"></div></div>
  </div>

  <div id="crosshair"></div>
  <div id="celebrationLayer" aria-hidden="true"></div>

  <div id="overlay">
    <div class="overlayStack">
      <div class="overlayTitle">
        <h1>ドキドキアーチェリー</h1>
      </div>
      <div class="card">
        <p>画面クリックで開始（マウス固定）</p>
        <p>
          <span class="kbd">左クリック長押し</span> でチャージ →
          <span class="kbd">左クリックを離す</span> で発射
        </p>
        <p>
          矢が止まったら <span class="kbd">左クリック</span> で元の視点に戻る /
          <span class="kbd">ESC</span> でマウス解除
        </p>
        <div id="errorBox"></div>
      </div>
    </div>
  </div>

  <div id="gameOverScreen">GAME OVER</div>

  <script type="module">
    import * as THREE from "three";
    import { PointerLockControls } from "three/addons/controls/PointerLockControls.js";

    // ============================================================
    // 3D アーチェリーゲーム
    // ------------------------------------------------------------
    // 役割ごとにメソッド分けして、後で修正しやすい構成にしている
    //
    // createCore()         : Scene / Camera / Renderer / Controls
    // createEnvironment()  : 空・地面・照明・背景演出
    // createTargetSystem() : 的
    // createBowSystem()    : 弓と装填中の矢
    // createArrowModel()   : 飛ぶ矢の共通モデル
    // setupInput()         : 入力処理
    // update*()            : 毎フレーム更新
    // ============================================================

    // ------------------------------------------------------------
    // DOM
    // ------------------------------------------------------------
    const overlay = document.getElementById("overlay");
    const gameOverScreen = document.getElementById("gameOverScreen");
    const errorBox = document.getElementById("errorBox");
    const hudText = document.getElementById("hudText");
    const chargeBar = document.getElementById("chargeBar");
    const celebrationLayer = document.getElementById("celebrationLayer");
    const WIND_DIRECTIONS = [
      {
        label: "左",
        symbol: "←",
        vector: new THREE.Vector3(-1, 0, 0)
      },
      {
        label: "右",
        symbol: "→",
        vector: new THREE.Vector3(1, 0, 0)
      }
    ];
    const CONFETTI_COLORS = [
      "#ffe066",
      "#ff8fab",
      "#7bdff2",
      "#b8f2a1",
      "#cdb4ff",
      "#ffffff"
    ];
    const CONFETTI_PIECES_PER_HIT = 40;
    const MAX_ACTIVE_CONFETTI_BURSTS = 3;
    const isTouchDevice =
      ("ontouchstart" in window) ||
      (navigator.maxTouchPoints > 0) ||
      (navigator.msMaxTouchPoints > 0);

    function showError(message) {
      errorBox.style.display = "block";
      errorBox.textContent = message;
    }

    // ------------------------------------------------------------
    // グローバル状態
    // ------------------------------------------------------------
    const game = {
      scene: null,
      camera: null,
      renderer: null,
      controls: null,
      clock: new THREE.Clock(),

      // ワールド
      targetFace: null,
      targetRadius: 0.8,

      // 手元の弓まわり
      bowRoot: null,
      bowString: null,
      loadedArrow: null,

      // ゲーム状態
      isCharging: false,
      chargeTime: 0,
      maxChargeTime: 1.7,
      hasLoadedArrow: true,

      shots: 0,
      hits: 0,
      score: 0,
      hasStarted: false,
      isGameOver: false,
      timeLimit: 30,
      timeRemaining: 30,

      // 発射済み矢
      flyingArrows: [],

      // 追従カメラ
      followArrow: null,
      isHoldingOnImpact: false,
      isReturningCamera: false,
      impactHoldTime: 0,
      savedCameraPosition: new THREE.Vector3(),
      savedCameraQuaternion: new THREE.Quaternion(),
      followOffsetDistance: 3.2,
      followOffsetHeight: 0.65,
      followLookAhead: 5.0,
      followLerpSpeed: 6.5,
      returnLerpSpeed: 5.5,

      // スマホ用視点操作
      touchLook: {
        active: false,
        lastX: 0,
        lastY: 0,
        yaw: 0,
        pitch: 0,
        sensitivityX: 0.0032,
        sensitivityY: 0.0024
      },
      
      // 調整値
      gravity: new THREE.Vector3(0, -9.8, 0),
      windAccelerationScale: 1.35,
      wind: {
        directionIndex: 0,
        speed: 0
      },
      minSpeed: 18,
      maxSpeed: 56,
      maxLifetime: 10.0
      
    };
    
    // ============================================================
　　// 外部連携設定（PowerShell受信用）
　　// ============================================================
　　const SCORE_POST_URL = "http://localhost:5000/score"; // PowerShell側
　　const ENABLE_SCORE_POST = true; // ON/OFF切り替え

    // ------------------------------------------------------------
    // 起動
    // ------------------------------------------------------------
    try {
      init();
      animate();
    } catch (err) {
      showError("初期化エラー:\n" + (err?.stack || err?.message || String(err)));
    }

    // ============================================================
    // 初期化
    // ============================================================
    function init() {
      createCore();
      createEnvironment();
      createTargetSystem();
      createBowSystem();
      setupInput();
      setupResize();
      updateHUD();
    }

    // ============================================================
    // Core: Scene / Camera / Renderer / Controls
    // ============================================================
    function createCore() {
      // シーン
      game.scene = new THREE.Scene();
      game.scene.background = new THREE.Color(0x87ceeb); // 青空

      // カメラ
      game.camera = new THREE.PerspectiveCamera(
        70,
        window.innerWidth / window.innerHeight,
        0.01,
        800
      );
      game.camera.position.set(0, 1.6, 8);
      game.camera.rotation.order = "YXZ";
      game.touchLook.yaw = game.camera.rotation.y;
      game.touchLook.pitch = game.camera.rotation.x;

      game.savedCameraPosition.copy(game.camera.position);
      game.savedCameraQuaternion.copy(game.camera.quaternion);

      // レンダラ
      game.renderer = new THREE.WebGLRenderer({ antialias: true });
      game.renderer.setSize(window.innerWidth, window.innerHeight);
      game.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      game.renderer.domElement.style.touchAction = "none";
      document.body.appendChild(game.renderer.domElement);

      // 視点操作
      game.controls = new PointerLockControls(game.camera, document.body);

      // スマホ向け説明文へ差し替え
      if (isTouchDevice) {
        const card = document.querySelector("#overlay .card");
        if (card) {
          card.innerHTML = `
            <p>画面タップで開始</p>
            <p>
              <span class="kbd">長押し</span> でチャージ →
              <span class="kbd">指を離す</span> で発射
            </p>
            <p>
              <span class="kbd">ドラッグ</span> で視点移動 /
              矢が止まったら <span class="kbd">タップ</span> で元の視点に戻る
            </p>
            <div id="errorBox"></div>
          `;
        }
      }

      function handleOverlayStart(e) {
        if (game.isGameOver) return;

        if (isTouchDevice) {
          e.preventDefault();
          e.stopPropagation();

          overlay.classList.add("hidden");

          if (!game.hasStarted) {
            startGame();
          }
          return;
        }

        game.controls.lock();
      }

      overlay.addEventListener("click", handleOverlayStart);
      overlay.addEventListener("touchstart", handleOverlayStart, { passive: false });

      game.controls.addEventListener("lock", () => {
        overlay.classList.add("hidden");

        if (!game.hasStarted) {
          startGame();
        }
      });

      game.controls.addEventListener("unlock", () => {
        if (!game.isGameOver && !isTouchDevice) {
          overlay.classList.remove("hidden");
        }
      });
    }

    // ============================================================
    // Environment: 背景 / 地面 / 照明 / 背景デザイン
    // ============================================================
    function createEnvironment() {
      createLights();
      createGround();
      setGradientSky()
      createSkyDecoration();
      createMountains()
    }

    function createLights() {
      // 半球ライトで空と地面からの柔らかい光を表現
      const hemi = new THREE.HemisphereLight(0xffffff, 0x335566, 0.95);
      game.scene.add(hemi);

      // 方向ライトで立体感を足す
      const dir = new THREE.DirectionalLight(0xffffff, 0.9);
      dir.position.set(8, 14, 4);
      game.scene.add(dir);
    }

    function createGround() {

    // ===== 草テクスチャをCanvasで生成 =====
    const canvas = document.createElement("canvas");
    canvas.width = 256;
    canvas.height = 256;
  
    const ctx = canvas.getContext("2d");
    
    // ベースの草色
    ctx.fillStyle = "#4ea14e";
    ctx.fillRect(0, 0, 256, 256);

    // 草の色ムラを作る
    for (let i = 0; i < 5000; i++) {

      const x = Math.random() * 256;
      const y = Math.random() * 256;

      const green = 120 + Math.random() * 80;

      ctx.fillStyle = `rgb(${30 + Math.random()*30}, ${green}, ${30})`;
      ctx.fillRect(x, y, 2, 2);
    }

    // CanvasをThree.jsテクスチャに変換
    const texture = new THREE.CanvasTexture(canvas);

    texture.wrapS = THREE.RepeatWrapping;
    texture.wrapT = THREE.RepeatWrapping;
    texture.repeat.set(60, 60);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(1000, 1000),
      new THREE.MeshStandardMaterial({
        map: texture,
        roughness: 1.0,
        metalness: 0.0
      })
    );

    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;

    game.scene.add(ground);
  }

  function setGradientSky() {
    const canvas = document.createElement("canvas");
    canvas.width = 1;
    canvas.height = 512;
    const ctx = canvas.getContext("2d");

    const gradient = ctx.createLinearGradient(0, 0, 0, 512);

    // 上空（深い青〜少し紫）
    gradient.addColorStop(0, "#0b1d51");

    // 中間（濃い青）
    gradient.addColorStop(0.3, "#1e3fa3");

    // 少し明るい青
    gradient.addColorStop(0.55, "#3f77ff");

    // 地平線付近（霞っぽい）
    gradient.addColorStop(0.8, "#87bfff");

    // 一番下（白に近い青）
    gradient.addColorStop(1, "#d6ecff");

    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, 1, 512);

    // ☀️ 太陽っぽいハイライト（ほんのり）
    const sunGradient = ctx.createRadialGradient(0.5, 400, 10, 0.5, 400, 120);
    sunGradient.addColorStop(0, "rgba(255,255,255,0.25)");
    sunGradient.addColorStop(1, "rgba(255,255,255,0)");

    ctx.fillStyle = sunGradient;
    ctx.fillRect(0, 0, 1, 512);

    const texture = new THREE.CanvasTexture(canvas);
    texture.magFilter = THREE.LinearFilter;

    game.scene.background = texture;
  }


    function createSkyDecoration() {
      // 雲っぽいオブジェクトを遠景に置いて、少しだけ見た目を良くする
      const cloudMat = new THREE.MeshStandardMaterial({
        color: 0xdff0ff,
        transparent: true,
        opacity: 0.28,
        roughness: 1.0
      });

      for (let i = 0; i < 7; i++) {
        const cloud = new THREE.Mesh(
          new THREE.SphereGeometry(1.6 + Math.random() * 1.6, 16, 16),
          cloudMat
        );
        cloud.position.set(
          -24 + i * 8,
          9 + Math.random() * 4,
          -24 - Math.random() * 40
        );
        cloud.scale.set(1.9, 0.7, 0.9);
        game.scene.add(cloud);
      }
    }

    function createMountains() {
    const geo = new THREE.ConeGeometry(10, 20, 4);
    const mat = new THREE.MeshStandardMaterial({
      color: 0x446688,
      roughness: 1
    });

    for (let i = 0; i < 20; i++) {
      const m = new THREE.Mesh(geo, mat);

      m.position.set(
        (Math.random() - 0.5) * 600,
        10,
        -200 - Math.random() * 200
      );

      game.scene.add(m);
    }
  }

    // ============================================================
    // Target: 的の生成
    // ============================================================
    function createTargetSystem() {
      const targetGroup = new THREE.Group();
      game.targetRadius = 0.8;
      const targetThickness = 0.14;
      const targetCenter = new THREE.Vector3(0, 1.6, -30);

      // 的の正面
      const face = new THREE.Mesh(
        new THREE.CircleGeometry(game.targetRadius, 64),
        new THREE.MeshStandardMaterial({
          map: createTargetTexture(),
          roughness: 0.92
        })
      );
      face.position.copy(targetCenter);
      face.position.z += targetThickness / 2 + 0.01;
      targetGroup.add(face);

      // 的の厚み
      const back = new THREE.Mesh(
        new THREE.CylinderGeometry(game.targetRadius, game.targetRadius, targetThickness, 48, 1, true),
        new THREE.MeshStandardMaterial({
          color: 0xd2b48c,
          roughness: 1.0
        })
      );
      back.position.copy(targetCenter);
      back.rotation.x = Math.PI / 2;
      targetGroup.add(back);

      // 支柱
      const pole = new THREE.Mesh(
        new THREE.CylinderGeometry(0.06, 0.07, 2.6, 16),
        new THREE.MeshStandardMaterial({
          color: 0x6b4f2a,
          roughness: 1.0
        })
      );
      pole.position.set(0, 0.85, -30);
      targetGroup.add(pole);

      game.targetFace = face;
      game.scene.add(targetGroup);
    }

    function createTargetTexture(size = 1024) {
      const canvas = document.createElement("canvas");
      canvas.width = canvas.height = size;
      const ctx = canvas.getContext("2d");

      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, size, size);

      const cx = size / 2;
      const cy = size / 2;

      // アーチェリーの的 (FITA/WA 標準ターゲット配色)
      // 外側から中心に向かって描画
      const unit = (size / 2) / 10;

      const rings = [
        // White (1, 2)
        { r: unit * 10, color: "#ffffff", stroke: "#d0d0d0" },
        { r: unit * 9,  color: "#ffffff", stroke: "#d0d0d0" },
        // Black (3, 4)
        { r: unit * 8,  color: "#111111", stroke: "#555555" },
        { r: unit * 7,  color: "#111111", stroke: "#555555" },
        // Blue (5, 6)
        { r: unit * 6,  color: "#0099ff", stroke: "rgba(0,0,0,0.2)" },
        { r: unit * 5,  color: "#0099ff", stroke: "rgba(0,0,0,0.2)" },
        // Red (7, 8)
        { r: unit * 4,  color: "#ff0000", stroke: "rgba(0,0,0,0.2)" },
        { r: unit * 3,  color: "#ff0000", stroke: "rgba(0,0,0,0.2)" },
        // Gold (9, 10)
        { r: unit * 2,  color: "#ffe500", stroke: "rgba(160,140,0,0.4)" },
        { r: unit * 1,  color: "#ffe500", stroke: "rgba(160,140,0,0.4)" }
      ];

      ctx.lineWidth = size * 0.003; // 少し細めの線

      for (const ring of rings) {
        ctx.beginPath();
        ctx.arc(cx, cy, ring.r, 0, Math.PI * 2);
        ctx.closePath();
        
        ctx.fillStyle = ring.color;
        ctx.fill();
        
        ctx.strokeStyle = ring.stroke;
        ctx.stroke();
      }

      // 中心点 (+)
      ctx.fillStyle = "#222222";
      ctx.font = `bold ${unit * 0.6}px sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("+", cx, cy);

      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      texture.minFilter = THREE.LinearMipmapLinearFilter;
      texture.magFilter = THREE.LinearFilter;
      texture.generateMipmaps = true;
      texture.anisotropy = game.renderer.capabilities.getMaxAnisotropy();
      return texture;
    }

    // ============================================================
    // Bow: 弓と装填中の矢
    // ============================================================
    function createBowSystem() {
      // bowRoot はカメラに追従する“手元”全体
      const bowRoot = new THREE.Group();

      // 弓本体
      const bowGroup = createBowModel();
      bowRoot.add(bowGroup);

      // 装填中の矢
      const loadedArrow = createArrowModel();
      bowRoot.add(loadedArrow);

      // カメラにぶら下げる
      game.camera.add(bowRoot);
      game.scene.add(game.camera);

      game.bowRoot = bowRoot;
      game.loadedArrow = loadedArrow;

      // 装填中の矢を弓の追従対象として登録
      if (bowGroup?.userData?.attachArrow) {
        bowGroup.userData.attachArrow(loadedArrow);
      }

      updateLoadedArrowVisual();
      updateBowDraw(0);
      applyResponsiveBowLayout();
    }

    function applyResponsiveBowLayout() {
      if (!game.bowRoot) return;

      const isPortrait = window.innerHeight > window.innerWidth;
      const isMobilePortrait = isTouchDevice && isPortrait;

      if (isMobilePortrait) {
        // 縦画面スマホでは弓を少し内側に寄せて小さくする
        game.bowRoot.position.set(-0.18, -0.10, 0.00);
        game.bowRoot.scale.set(0.82, 0.82, 0.82);

        // 少しだけ広く見せる
        game.camera.fov = 78;
      } else {
        // それ以外は従来どおり
        game.bowRoot.position.set(0, 0, 0);
        game.bowRoot.scale.set(1, 1, 1);

        game.camera.fov = 70;
      }

      game.camera.updateProjectionMatrix();
    }

    // ★★弓のモデルを生成する関数
 function createBowModel() {
  const bowGroup = new THREE.Group();

  const baseX = 0.58;

  // --------------------------------------------------
  // 座標変換
  // --------------------------------------------------
  function toWorld(local) {
    return local.clone()
      .applyEuler(new THREE.Euler(0, bowTiltY, 0, "XYZ"))
      .add(new THREE.Vector3(baseX, baseY, baseZ));
  }

  function applyLocalTransform(object3D, localPos) {
    object3D.position.copy(toWorld(localPos));
    object3D.rotation.set(0, bowTiltY, 0, "XYZ");

  // --------------------------------------------------
  // リム中心線
  // 返りのある現代リカーブ風
  // --------------------------------------------------
  function createUpperLimbCurve(draw = 0, kick = 0) {
    const flex = draw * 0.070 + kick * 0.040;

    const tipForward = flex * 2.20;
    const tipSide = flex * 1.10;
    const midBend = flex * 0.70;
    const rootBack = flex * 0.28;

    return new THREE.CatmullRomCurve3([
      // ライザー上端から自然に立ち上がる
      new THREE.Vector3(0.010, 0.305, -0.012 - rootBack * 0.40),
      new THREE.Vector3(0.020, 0.355, -0.004 - rootBack * 0.20),

      // 根元は太くて平たい感じを残しつつ前方へ
      new THREE.Vector3(0.038 + tipSide * 0.06, 0.470, 0.018 + midBend * 0.30),
      new THREE.Vector3(0.050 + tipSide * 0.18, 0.610, 0.052 + midBend * 0.72),
      new THREE.Vector3(0.040 + tipSide * 0.30, 0.745, 0.100 + tipForward * 0.80),
      new THREE.Vector3(0.018 + tipSide * 0.20, 0.850, 0.140 + tipForward * 0.96),

      // 先端
      new THREE.Vector3(0.004, bowHalfLen, 0.168 + tipForward * 1.04)
    ]);
  }

  function createLowerLimbCurve(draw = 0, kick = 0) {
    const upper = createUpperLimbCurve(draw, kick);
    const points = upper.points.map(p => new THREE.Vector3(p.x, -p.y, p.z));
    return new THREE.CatmullRomCurve3(points.reverse());
  }

  // --------------------------------------------------
  // リム断面: 根元太く・平べったく、先端へ細く
  // --------------------------------------------------
  function createTaperedLimbGeometry(curve) {
    const tubularSegments = 40;
    const radialSegments = 18;

    const frames = curve.computeFrenetFrames(tubularSegments, false);
    const positions = [];
    const normals = [];
    const uvs = [];
    const indices = [];

    for (let i = 0; i <= tubularSegments; i++) {
      const t = i / tubularSegments;
      const p = curve.getPointAt(t);

      const n = frames.normals[i].clone().normalize();
      const b = frames.binormals[i].clone().normalize();

      // 根元: 幅広で厚め / 先端: 細く薄い
      const width = THREE.MathUtils.lerp(0.050, 0.011, t);
      const thickness = THREE.MathUtils.lerp(0.0085, 0.0032, t);

      for (let j = 0; j < radialSegments; j++) {
        const a = (j / radialSegments) * Math.PI * 2;
        const rx = Math.cos(a) * width;
        const ry = Math.sin(a) * thickness;

        const pos = new THREE.Vector3()
          .copy(p)
          .addScaledVector(n, rx)
          .addScaledVector(b, ry);

        positions.push(pos.x, pos.y, pos.z);

        const normal = new THREE.Vector3()
          .copy(n).multiplyScalar(Math.cos(a))
          .addScaledVector(b, Math.sin(a))
          .normalize();
        normals.push(normal.x, normal.y, normal.z);

        uvs.push(j / radialSegments, t);
      }
    }

    for (let i = 0; i < tubularSegments; i++) {
      for (let j = 0; j < radialSegments; j++) {
        const a = i * radialSegments + j;
        const b = i * radialSegments + ((j + 1) % radialSegments);
        const c = (i + 1) * radialSegments + j;
        const d = (i + 1) * radialSegments + ((j + 1) % radialSegments);

        indices.push(a, c, b);
        indices.push(b, c, d);
      }
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
    geo.setAttribute("normal", new THREE.Float32BufferAttribute(normals, 3));
    geo.setAttribute("uv", new THREE.Float32BufferAttribute(uvs, 2));
    geo.setIndex(indices);
    geo.computeBoundingSphere();
    return geo;
  }

  // --------------------------------------------------

  function createRiserShape() {

  function createRiserMesh() {
    const riserGroup = new THREE.Group();

    const fullDepth = 0.06;
    const insetDepth = 0.030;

    const frontZ = fullDepth;
    const backZ = 0.0;
    const recessedBackZ = backZ + insetDepth;

    const baseMat = riserMaterial.clone();
    const wallMat = riserMaterial.clone();

    baseMat.side = THREE.DoubleSide;
    wallMat.side = THREE.DoubleSide;

    // --------------------------------------------------
    // 1) 前面
    // --------------------------------------------------
    const frontShape = createRiserShape();
    const frontGeo = new THREE.ShapeGeometry(frontShape, 128);
    const frontMesh = new THREE.Mesh(frontGeo, baseMat);
    frontMesh.position.z = frontZ;
    riserGroup.add(frontMesh);

    // --------------------------------------------------
    // 2) 外周側壁
    // くぼみ帯の左右だけ奥側を recessedBackZ にする
    // --------------------------------------------------
    const outerWall = createMatchedOuterWall(
      frontZ,
      backZ,
      recessedBackZ,
      wallMat
    );
    riserGroup.add(outerWall);

    // --------------------------------------------------
    // 3) 背面上部
    // --------------------------------------------------
    const backTopShape = createBackTopShape();
    const backTopGeo = new THREE.ShapeGeometry(backTopShape, 128);
    const backTopMesh = new THREE.Mesh(backTopGeo, wallMat);
    backTopMesh.position.z = backZ;
    riserGroup.add(backTopMesh);

    // --------------------------------------------------
    // 4) 背面下部
    // --------------------------------------------------
    const backBottomShape = createBackBottomShape();
    const backBottomGeo = new THREE.ShapeGeometry(backBottomShape, 128);
    const backBottomMesh = new THREE.Mesh(backBottomGeo, wallMat);
    backBottomMesh.position.z = backZ;
    riserGroup.add(backBottomMesh);

    // --------------------------------------------------
    // 5) くぼみ底面
    // --------------------------------------------------
    const recessShape = createRecessBandShape();
    const recessGeo = new THREE.ShapeGeometry(recessShape, 128);
    const recessMesh = new THREE.Mesh(recessGeo, wallMat);
    recessMesh.position.z = recessedBackZ;
    riserGroup.add(recessMesh);

    // --------------------------------------------------
    // 6) くぼみ上端・下端の段差壁
    // --------------------------------------------------
    riserGroup.add(createQuadWall(
      new THREE.Vector2(-0.030, 0.280),
      new THREE.Vector2( 0.060, 0.280),
      backZ,
      recessedBackZ,
      wallMat
    ));

    riserGroup.add(createQuadWall(
      new THREE.Vector2(-0.018, 0.000),
      new THREE.Vector2( 0.082, 0.000),
      recessedBackZ,
      backZ,
      wallMat
    ));

    // --------------------------------------------------
    // 8) グラデーション復活
    // --------------------------------------------------
    applyVerticalGradientToGroup(riserGroup);

    // --------------------------------------------------
    // 9) 中央へ寄せて縮小
    // --------------------------------------------------
    const box = new THREE.Box3().setFromObject(riserGroup);
    const center = box.getCenter(new THREE.Vector3());

    riserGroup.position.sub(center);
    riserGroup.scale.set(0.78, 0.78, 1.0);

    return riserGroup;
  }

  function createMatchedOuterWall(frontZ, backZ, recessedBackZ, material) {
    const positions = [];

    // --------------------------------------------------
    // 外周輪郭を、
    // 5) くぼみ底面
    // 6) 上端・下端段差壁
    // の頂点に合わせて分割した点列
    // --------------------------------------------------
    const points = [
      // 下側通常部
      new THREE.Vector2(-0.040, -0.430),
      new THREE.Vector2(-0.062, -0.402),
      new THREE.Vector2(-0.060, -0.350),
      new THREE.Vector2(-0.050, -0.305),
      new THREE.Vector2(-0.040, -0.245),
      new THREE.Vector2(-0.030, -0.185),
      new THREE.Vector2(-0.020, -0.120),
      new THREE.Vector2(-0.010, -0.070),
      new THREE.Vector2(-0.010, -0.020),

      // --------------------------------------------------
      // 下端段差壁との一致点
      // createQuadWall(
      //   (-0.018, 0.000) -> (0.082, 0.000),
      //   recessedBackZ -> backZ
      // )
      // --------------------------------------------------
      new THREE.Vector2(-0.018, 0.000),

      // 左側 recess 側壁区間
      new THREE.Vector2(-0.012, 0.040),
      new THREE.Vector2(-0.010, 0.080),
      new THREE.Vector2(-0.010, 0.120),
      new THREE.Vector2(-0.014, 0.170),
      new THREE.Vector2(-0.022, 0.220),

      // --------------------------------------------------
      // 上端段差壁との一致点
      // createQuadWall(
      //   (-0.030, 0.280) -> (0.060, 0.280),
      //   backZ -> recessedBackZ
      // )
      // --------------------------------------------------
      new THREE.Vector2(-0.030, 0.280),

      // 上側通常部
      new THREE.Vector2(-0.040, 0.275),
      new THREE.Vector2(-0.050, 0.335),
      new THREE.Vector2(-0.060, 0.384),
      new THREE.Vector2( 0.010, 0.418),
      new THREE.Vector2( 0.026, 0.385),
      new THREE.Vector2( 0.066, 0.320),

      // --------------------------------------------------
      // 上端段差壁の右端一致点
      // --------------------------------------------------
      new THREE.Vector2(0.060, 0.280),

      // 右側 recess 側壁区間
      new THREE.Vector2(0.072, 0.230),
      new THREE.Vector2(0.082, 0.170),
      new THREE.Vector2(0.088, 0.110),
      new THREE.Vector2(0.088, 0.050),

      // --------------------------------------------------
      // 下端段差壁の右端一致点
      // --------------------------------------------------
      new THREE.Vector2(0.082, 0.000),

      // 右下通常部
      new THREE.Vector2(0.096, -0.140),
      new THREE.Vector2(0.084, -0.250),
      new THREE.Vector2(0.066, -0.340),
      new THREE.Vector2(0.026, -0.400),
      new THREE.Vector2(0.010, -0.430)

    // --------------------------------------------------
    // recessedBackZ に落とす点
    // 5) createRecessBandShape() の輪郭
    // 6) createQuadWall() の接続点
    // に一致させる
    // --------------------------------------------------
    function isRecessPoint(p) {
      return (
        // 左側 recess
        (Math.abs(p.x - (-0.018)) < 1e-6 && Math.abs(p.y - 0.000) < 1e-6) ||
        (Math.abs(p.x - (-0.012)) < 1e-6 && Math.abs(p.y - 0.040) < 1e-6) ||
        (Math.abs(p.x - (-0.010)) < 1e-6 && Math.abs(p.y - 0.080) < 1e-6) ||
        (Math.abs(p.x - (-0.010)) < 1e-6 && Math.abs(p.y - 0.120) < 1e-6) ||
        (Math.abs(p.x - (-0.014)) < 1e-6 && Math.abs(p.y - 0.170) < 1e-6) ||
        (Math.abs(p.x - (-0.022)) < 1e-6 && Math.abs(p.y - 0.220) < 1e-6) ||
        (Math.abs(p.x - (-0.030)) < 1e-6 && Math.abs(p.y - 0.280) < 1e-6) ||

        // 上端右端
        (Math.abs(p.x - 0.060) < 1e-6 && Math.abs(p.y - 0.280) < 1e-6) ||

        // 右側 recess
        (Math.abs(p.x - 0.072) < 1e-6 && Math.abs(p.y - 0.230) < 1e-6) ||
        (Math.abs(p.x - 0.082) < 1e-6 && Math.abs(p.y - 0.170) < 1e-6) ||
        (Math.abs(p.x - 0.088) < 1e-6 && Math.abs(p.y - 0.110) < 1e-6) ||
        (Math.abs(p.x - 0.088) < 1e-6 && Math.abs(p.y - 0.050) < 1e-6) ||
        (Math.abs(p.x - 0.082) < 1e-6 && Math.abs(p.y - 0.000) < 1e-6)
      );
    }

    function getBackZForPoint(p) {
      return isRecessPoint(p) ? recessedBackZ : backZ;
    }

    for (let i = 0; i < points.length; i++) {
      const a = points[i];
      const b = points[(i + 1) % points.length];

      const aBackZ = getBackZForPoint(a);
      const bBackZ = getBackZForPoint(b);

      positions.push(
        a.x, a.y, aBackZ,
        b.x, b.y, bBackZ,
        a.x, a.y, frontZ,

        b.x, b.y, bBackZ,
        b.x, b.y, frontZ,
        a.x, a.y, frontZ
      );
    }

    const geom = new THREE.BufferGeometry();
    geom.setAttribute(
      "position",
      new THREE.BufferAttribute(new Float32Array(positions), 3)
    );
    geom.computeVertexNormals();

    return new THREE.Mesh(geom, material);
  }

  function applyVerticalGradientToGroup(group) {
    const box = new THREE.Box3().setFromObject(group);
    const minY = box.min.y;
    const maxY = box.max.y;
    const halfH = Math.max(Math.abs(minY), Math.abs(maxY));

    const centerColor = new THREE.Color(0xcfd4db);
    const edgeColor = new THREE.Color(0x121418);

    group.updateMatrixWorld(true);

    group.traverse(obj => {
      if (!obj.isMesh || !obj.geometry?.attributes?.position) return;

      const pos = obj.geometry.attributes.position;
      const colors = [];

      for (let i = 0; i < pos.count; i++) {
        const local = new THREE.Vector3(
          pos.getX(i),
          pos.getY(i),
          pos.getZ(i)
        );

        const world = local.clone().applyMatrix4(obj.matrixWorld);

        let t = Math.abs(world.y) / halfH;
        t = THREE.MathUtils.clamp(Math.pow(t, 0.85), 0, 1);

        const c = centerColor.clone().lerp(edgeColor, t);
        colors.push(c.r, c.g, c.b);
      }

      obj.geometry.setAttribute(
        "color",
        new THREE.Float32BufferAttribute(colors, 3)
      );

      obj.material = obj.material.clone();
      obj.material.vertexColors = true;
    });
  }

  function createQuadWall(p1, p2, z1, z2, material) {
    const positions = new Float32Array([
      p1.x, p1.y, z1,
      p2.x, p2.y, z1,
      p1.x, p1.y, z2,

      p2.x, p2.y, z1,
      p2.x, p2.y, z2,
      p1.x, p1.y, z2
    ]);

    const geom = new THREE.BufferGeometry();
    geom.setAttribute("position", new THREE.BufferAttribute(positions, 3));
    geom.computeVertexNormals();

    return new THREE.Mesh(geom, material);
  }

  // --------------------------------------------------

  // --------------------------------------------------
  const riserGroup = new THREE.Group();
  const limbGroup = new THREE.Group();
  const tipGroup = new THREE.Group();

  bowGroup.add(riserGroup);
  bowGroup.add(limbGroup);
  bowGroup.add(tipGroup);

  // --------------------------------------------------
  // riser 本体
  // --------------------------------------------------
  const riserMesh = createRiserMesh();
  riserGroup.add(riserMesh);

  // グリップ
  const grip = new THREE.Mesh(
    new THREE.CapsuleGeometry(0.026, 0.118, 8, 18),
    gripMaterial
  );
  // グリップ位置（ライザーの向きと同期しているので他の位置とは設定方法が異なる）
  //　左右（プラスで奥へ）、上下（プラスで上へ）、前後（プラスで右へ）
  grip.position.set(-0.040, -0.100, 0.000);
  grip.rotation.z = 0.12;
  riserGroup.add(grip);

  // サイトバー形状（ハンドルにつけられている部分）
  const sightBar = new THREE.Mesh(
    new THREE.BoxGeometry(0.02, 0.05, 0.30),

  );
  // サイトをライザーのローカル座標系で配置
  // ライザーが-5度回転しているので、サイトを+5度回転させて相殺
  const sightCompensation = 4.9;
  
  // 元の位置からY軸周りに補正回転を適用
  const sightBarPos = new THREE.Vector3(0.030, 0.180, -0.100);
  sightBarPos.applyAxisAngle(new THREE.Vector3(0, 1, 0), sightCompensation);
  sightBar.position.copy(sightBarPos);
  sightBar.rotation.y = sightCompensation;
  riserGroup.add(sightBar);

  // サイトアーム形状（サイトバーから出ている標準の棒）
  const sightArm = new THREE.Mesh(
    new THREE.BoxGeometry(0.060, 0.009, 0.009),
    detailMaterial
  );
  const sightArmPos = new THREE.Vector3(-0.050, 0.190, -0.150);
  sightArmPos.applyAxisAngle(new THREE.Vector3(0, 1, 0), sightCompensation);
  sightArm.position.copy(sightArmPos);
  sightArm.rotation.y = sightCompensation;
  riserGroup.add(sightArm);

  // 標準形状
  const sightRing = new THREE.Mesh(
    new THREE.TorusGeometry(0.018, 0.0032, 12, 66),
    detailMaterial
  );
  const sightRingPos = new THREE.Vector3(-0.100, 0.190, -0.150);
  sightRingPos.applyAxisAngle(new THREE.Vector3(0, 1, 0), sightCompensation);
  sightRing.position.copy(sightRingPos);
  sightRing.rotation.y = Math.PI + sightCompensation;
  riserGroup.add(sightRing);

  // 標準中央形状（ハンドルにつけられている部分）
  const sightPin = new THREE.Mesh(
    new THREE.BoxGeometry(0.001, 0.015, 0.005),
    detailMaterial
  );
  const sightPinPos = new THREE.Vector3(-0.100, 0.184, -0.150);
  sightPinPos.applyAxisAngle(new THREE.Vector3(0, 1, 0), sightCompensation);
  sightPin.position.copy(sightPinPos);
  sightPin.rotation.y = sightCompensation;
  riserGroup.add(sightPin);
  
  // limb pocket（接続部を自然に）
  function createLimbPocket(localY, isUpper) {
    const g = new THREE.Group();

    // ライザー上下端に付く受け座
    const seat = new THREE.Mesh(
      new THREE.BoxGeometry(0.030, 0.040, 0.040),
      pocketMaterial
    );
    seat.position.set(0.010, localY, 0.000);
    g.add(seat);

    // リムへつながる細長いフェード部
    const neck = new THREE.Mesh(
      new THREE.BoxGeometry(0.022, 0.070, 0.026),
      pocketMaterial
    );
    neck.position.set(0.016, localY + (isUpper ? 0.028 : -0.028), 0.000);
    neck.rotation.z = isUpper ? -0.10 : 0.10;
    g.add(neck);

    return g;
  }

  riserGroup.add(createLimbPocket(0.255, -0.20));
  riserGroup.add(createLimbPocket(-0.255, 0.20));

  // riser 配置
  riserGroup.position.copy(toWorld(new THREE.Vector3(0, 0, 0)));
  riserGroup.rotation.set(0, bowTiltY + riserYawOffset, 0, "XYZ");

  // --------------------------------------------------
  // limb メッシュ
  // --------------------------------------------------
  const upperLimbMesh = new THREE.Mesh(
    createTaperedLimbGeometry(createUpperLimbCurve(0, 0)),
    limbMaterial
  );
  const lowerLimbMesh = new THREE.Mesh(
    createTaperedLimbGeometry(createLowerLimbCurve(0, 0)),
    limbMaterial
  );

  limbGroup.add(upperLimbMesh);
  limbGroup.add(lowerLimbMesh);
  applyLocalTransform(limbGroup, new THREE.Vector3(0, 0, 0));

  // --------------------------------------------------
  // limb tip
  // --------------------------------------------------
  function createTipMesh() {
    const g = new THREE.Group();

    const cap = new THREE.Mesh(
      new THREE.CapsuleGeometry(0.011, 0.032, 5, 12),
      darkDetailMaterial
    );
    cap.rotation.z = Math.PI / 2;
    g.add(cap);

    const groove = new THREE.Mesh(
      new THREE.BoxGeometry(0.010, 0.006, 0.014),
      detailMaterial
    );
    groove.position.set(0.012, 0, 0);
    g.add(groove);

    return g;
  }

  const upperTip = createTipMesh();
  const lowerTip = createTipMesh();
  tipGroup.add(upperTip);
  tipGroup.add(lowerTip);

  function updateTipTransform(tipMesh, curve, isUpper) {
    const t = isUpper ? 1 : 0;
    const localPos = curve.getPointAt(t);
    const tangent = curve.getTangentAt(t).normalize();

    tipMesh.position.copy(toWorld(localPos));

    const dir = tangent.clone();
    const target = localPos.clone().add(dir);

    const m = new THREE.Matrix4().lookAt(
      localPos,
      target,
      new THREE.Vector3(0, 1, 0)
    );

    const qWorld = new THREE.Quaternion()
      .setFromRotationMatrix(m)
      .multiply(new THREE.Quaternion().setFromEuler(
        new THREE.Euler(0, Math.PI / 2, 0)
      ));

    const baseQ = new THREE.Quaternion().setFromEuler(
      new THREE.Euler(0, bowTiltY, 0)
    );

    tipMesh.quaternion.copy(qWorld.premultiply(baseQ));
  }

  // --------------------------------------------------
  // 弦のローカル基準点
  // --------------------------------------------------
  function getStringLocals(draw = 0, kick = 0) {
    const flex = draw * 0.070 + kick * 0.040;
    const tipForward = flex * 2.05;
    const tipSide = flex * 1.10;

    // 弦を左へ移動させるオフセット（値を大きくすると左へ）
    const stringLeftOffset = 0.05;
    
    // 弦を手前へ移動させるオフセット（値を大きくすると手前へ）
    const stringForwardOffset = 0.10;
    
    // 弦を上へ移動させるオフセット（値を大きくすると上へ）
    const stringUpOffset = 0.05;

    const topLocal = new THREE.Vector3(
      0.002 + tipSide * 0.08 - stringLeftOffset,
      bowHalfLen + stringUpOffset,  // Y座標を上へ
      0.146 + tipForward * 0.96 + stringForwardOffset
    );

    const botLocal = new THREE.Vector3(
      0.002 + tipSide * 0.08 - stringLeftOffset,
      -bowHalfLen + stringUpOffset,  // Y座標を上へ
      0.146 + tipForward * 0.96 + stringForwardOffset
    );

    const straightMid = topLocal.clone().lerp(botLocal, 0.5);

    const midLocal = straightMid.clone().add(
      new THREE.Vector3(0, 0, draw * maxDraw)
    );

    return { topLocal, midLocal, botLocal };
  }

  // --------------------------------------------------
  // 弦
  // --------------------------------------------------
  const initLocals = getStringLocals(0, 0);

  const stringGeo = new THREE.BufferGeometry().setFromPoints([
    toWorld(initLocals.topLocal),
    toWorld(initLocals.midLocal),
    toWorld(initLocals.botLocal)
  ]);

  const string = new THREE.Line(stringGeo, stringMaterial);
  bowGroup.add(string);
  game.bowString = string;

  // --------------------------------------------------
  // 矢接続位置
  // --------------------------------------------------
  const arrowAttach = new THREE.Object3D();
  arrowAttach.position.copy(toWorld(initLocals.midLocal));
  bowGroup.add(arrowAttach);

  // --------------------------------------------------
  // 状態
  // --------------------------------------------------
  bowGroup.userData.charge = 0;
  bowGroup.userData.drawAmount = 0;
  bowGroup.userData.releaseVelocity = 0;
  bowGroup.userData.stringVibration = 0;
  bowGroup.userData.bowKick = 0;
  bowGroup.userData.attachedArrow = null;
  bowGroup.userData.arrowAttach = arrowAttach;

  // --------------------------------------------------
  // ノックを接続点へ合わせる
  // --------------------------------------------------
  function placeArrowByNock(arrow, attachPos) {
    if (!arrow) return;

    const nockToCenter = arrow.userData?.nockToCenter ?? 0.475;
    const forward = new THREE.Vector3(1, 0, 0)
      .applyQuaternion(arrow.quaternion)
      .normalize();

    arrow.position.copy(
      attachPos.clone().addScaledVector(forward, nockToCenter)
    );
  }

  // --------------------------------------------------
  // 弓形状再構築
  // --------------------------------------------------
  function rebuildBow(draw = 0, kick = 0) {
    const upperCurve = createUpperLimbCurve(draw, kick);
    const lowerCurve = createLowerLimbCurve(draw, kick);

    const upperGeo = createTaperedLimbGeometry(upperCurve);
    const lowerGeo = createTaperedLimbGeometry(lowerCurve);

    upperLimbMesh.geometry.dispose();
    lowerLimbMesh.geometry.dispose();

    upperLimbMesh.geometry = upperGeo;
    lowerLimbMesh.geometry = lowerGeo;

    updateTipTransform(upperTip, upperCurve, true);
    updateTipTransform(lowerTip, lowerCurve, false);
  }

  // --------------------------------------------------
  // 弦更新
  // --------------------------------------------------
  function updateString(draw = 0, kick = 0, vibePhase = 0, vibeAmp = 0) {
    const locals = getStringLocals(draw, kick);

    const top = toWorld(locals.topLocal);
    const mid = toWorld(
      locals.midLocal.clone().add(
        new THREE.Vector3(0, 0, Math.sin(vibePhase) * vibeAmp)
      )
    );
    const bot = toWorld(locals.botLocal);

    const pos = string.geometry.attributes.position;
    pos.setXYZ(0, top.x, top.y, top.z);
    pos.setXYZ(1, mid.x, mid.y, mid.z);
    pos.setXYZ(2, bot.x, bot.y, bot.z);
    pos.needsUpdate = true;

    arrowAttach.position.copy(mid);

    const arrow = bowGroup.userData.attachedArrow;
    if (arrow) {
      placeArrowByNock(arrow, mid);
    }
  }

  // --------------------------------------------------
  // チャージ
  // --------------------------------------------------
  bowGroup.userData.setCharge = function (value) {
    const c = THREE.MathUtils.clamp(value, 0, 1);
    bowGroup.userData.charge = c;
    bowGroup.userData.drawAmount = c;

    rebuildBow(c, 0);
    updateString(c, 0, 0, 0);
  };

  // --------------------------------------------------
  // 矢接続
  // --------------------------------------------------
  bowGroup.userData.attachArrow = function (arrow) {
    bowGroup.userData.attachedArrow = arrow;
    if (!arrow) return;

    placeArrowByNock(arrow, arrowAttach.position);
  };

  // --------------------------------------------------
  // リリース
  // --------------------------------------------------
  bowGroup.userData.releaseString = function () {
    const power = bowGroup.userData.drawAmount;

    bowGroup.userData.releaseVelocity = Math.max(0.22, power * 0.52);
    bowGroup.userData.stringVibration = 0.024 + power * 0.040;
    bowGroup.userData.bowKick = 0.60 + power * 0.72;
    bowGroup.userData.charge = 0;
  };

  // --------------------------------------------------
  // 毎フレーム更新
  // --------------------------------------------------
  bowGroup.userData.updateBowAnimation = function (dt, elapsed) {
    if (bowGroup.userData.drawAmount > 0) {
      bowGroup.userData.drawAmount -= bowGroup.userData.releaseVelocity * dt * 5.4;
      if (bowGroup.userData.drawAmount < 0) {
        bowGroup.userData.drawAmount = 0;
      }
    }

    bowGroup.userData.stringVibration *= Math.exp(-dt * 11.0);
    bowGroup.userData.bowKick *= Math.exp(-dt * 9.0);

    const kick = Math.sin(elapsed * 26.0) * bowGroup.userData.bowKick * 0.055;

    rebuildBow(bowGroup.userData.drawAmount, kick);
    updateString(
      bowGroup.userData.drawAmount,
      kick,
      elapsed * 64.0,
      bowGroup.userData.stringVibration
    );
  };

  // 初期状態
  rebuildBow(0, 0);
  updateString(0, 0, 0, 0);

  return bowGroup;
}
    // ★★弓のモデルを生成する関数
  
    // ============================================================
    // Arrow: 矢モデル生成
    // ------------------------------------------------------------
    // この矢モデルは「+X方向に矢じりが向く」基準で作る。
    // そうすると、後で進行方向へ回すのが簡単になる。
    // ============================================================
    function createArrowModel() {
      const group = new THREE.Group();

      // 軸（細め）
      const shaftRadius = 0.012;
      const shaft = new THREE.Mesh(
        new THREE.CylinderGeometry(shaftRadius, shaftRadius, 0.95, 12),
        new THREE.MeshStandardMaterial({
          color: 0x2f2f2f,
          roughness: 0.82
        })
      );
      shaft.rotation.z = -Math.PI / 2;
      group.add(shaft);

      // 矢じり
      const tip = new THREE.Mesh(
        // 円錐の底面の半径,高さ, 円周分割数
        new THREE.ConeGeometry(shaftRadius, 0.05, 30),
        new THREE.MeshStandardMaterial({
          color: 0x8d8d8d,
          roughness: 0.35
        })
      );
      tip.rotation.z = -Math.PI / 2;
      tip.position.x = 0.95 / 2 + 0.025;
      group.add(tip);

      // 羽根材質
      const featherBaseMat = new THREE.MeshStandardMaterial({
        color: 0xf28c28,
        roughness: 0.88,
        side: THREE.DoubleSide
      });

      // 羽の取り付け位置（後方）
      const featherX = -0.95 / 2 + 0.13;

      // ------------------------------------------------------------
      // 羽形状
      // ------------------------------------------------------------
      // ローカル座標で
      // - X: 矢の進行方向
      // - Y: 軸から外側へ立ち上がる方向
      // - Z: 羽の薄み
      //
      // y = 0 の下辺（最長辺）が「軸に接着される辺」
      // になるように形状を作る
      // ------------------------------------------------------------
      function createVaneGeometry() {
        const shape = new THREE.Shape();

        // 最長辺（接地辺）
        shape.moveTo(-0.060, 0.000);
        shape.lineTo( 0.082, 0.000);

        // 上側輪郭
        shape.lineTo( 0.088, 0.010);
        shape.lineTo( 0.078, 0.030);
        shape.lineTo( 0.058, 0.046);
        shape.lineTo( 0.028, 0.056);
        shape.lineTo(-0.004, 0.043);
        shape.lineTo(-0.028, 0.026);
        shape.lineTo(-0.046, 0.012);
        shape.lineTo(-0.060, 0.000);
        shape.closePath();

        const geom = new THREE.ExtrudeGeometry(shape, {
          depth: 0.0012,
          bevelEnabled: false
        });

        // 薄み方向の中心を原点へ
        geom.translate(0, 0, -0.0006);

        return geom;
      }

      const featherGeom = createVaneGeometry();

      // 接着面を少しだけ軸の外へ逃がしてZ-fightingを防ぐ
      const contactLift = 0.0002;

      function createFeather(radialAngle, color) {
        const mat = featherBaseMat.clone();
        mat.color.setHex(color);

        const feather = new THREE.Mesh(featherGeom, mat);

        // 羽の前後を反転
        feather.scale.x = -1;

        // 軸周りに回転
        feather.rotation.x = radialAngle;

        // y=0 の最長辺全体が軸に接するように配置
        feather.position.set(
          featherX,
          Math.cos(radialAngle) * (shaftRadius + contactLift),
          Math.sin(radialAngle) * (shaftRadius + contactLift)
        );

        return feather;
      }

      // 4枚の薄い羽
      const f1 = createFeather(0,             0xf28c28);
      const f2 = createFeather(Math.PI / 2,   0xffffff);
      const f3 = createFeather(Math.PI,       0xf28c28);
      const f4 = createFeather(Math.PI * 1.5, 0xffffff);

      group.add(f1, f2, f3, f4);

      // ノック（矢の最後方）からグループ中心までの距離
      // 軸長 0.95 の半分を基準にしている
      group.userData.nockToCenter = 0.475;

      return group;
    }

    // ============================================================
    // Input
    // ============================================================
    function setupInput() {
      // --------------------------------------------------
      // PC: 左クリック
      // --------------------------------------------------
      window.addEventListener("mousedown", (e) => {
        if (isTouchDevice) return;
        if (e.button !== 0) return;

        if (game.followArrow && game.isHoldingOnImpact) {
          startCameraReturn();
          return;
        }

        beginCharge();
      });

      window.addEventListener("mouseup", (e) => {
        if (isTouchDevice) return;
        if (e.button !== 0) return;

        releaseArrow();
      });

      // --------------------------------------------------
      // スマホ: タッチ
      // 1本指でドラッグしながら照準、
      // 押している間チャージ、離すと発射
      // --------------------------------------------------
      window.addEventListener("touchstart", (e) => {
        if (!isTouchDevice) return;
        if (e.touches.length !== 1) return;

        e.preventDefault();

        const touch = e.touches[0];

        if (game.followArrow && game.isHoldingOnImpact) {
          startCameraReturn();
          return;
        }

        game.touchLook.active = true;
        game.touchLook.lastX = touch.clientX;
        game.touchLook.lastY = touch.clientY;

        beginCharge();
      }, { passive: false });

      window.addEventListener("touchmove", (e) => {
        if (!isTouchDevice) return;
        if (!game.touchLook.active) return;
        if (e.touches.length !== 1) return;

        e.preventDefault();

        const touch = e.touches[0];
        const dx = touch.clientX - game.touchLook.lastX;
        const dy = touch.clientY - game.touchLook.lastY;

        game.touchLook.lastX = touch.clientX;
        game.touchLook.lastY = touch.clientY;

        updateTouchLook(dx, dy);
      }, { passive: false });

      window.addEventListener("touchend", (e) => {
        if (!isTouchDevice) return;

        e.preventDefault();
        game.touchLook.active = false;

        releaseArrow();
      }, { passive: false });

      window.addEventListener("touchcancel", (e) => {
        if (!isTouchDevice) return;

        e.preventDefault();
        game.touchLook.active = false;
        game.isCharging = false;
        game.chargeTime = 0;
        updateBowDraw(0);
        updateHUD();
      }, { passive: false });
    }

    function setupResize() {
      window.addEventListener("resize", () => {
        game.camera.aspect = window.innerWidth / window.innerHeight;
        game.camera.updateProjectionMatrix();
        applyResponsiveBowLayout();
      });
    }

    // ============================================================
    // チャージ / 発射 / リロード
    // ============================================================
    function beginCharge() {
      if (game.isGameOver) return;
      if (!isTouchDevice && !game.controls.isLocked) return;
      if (isTouchDevice && !game.hasStarted) return;
      if (isCameraInCinematicMode()) return;
      if (!game.hasLoadedArrow) return;

      game.isCharging = true;
      game.chargeTime = 0;
    }

    function releaseArrow() {
      // チャージ中でなければ何もしない
      if (!game.isCharging) return;

      game.isCharging = false;

      // 矢が装填されていなければ発射しない
      if (!game.hasLoadedArrow) return;

      // 0〜1 のチャージ率
      const chargeRatio = THREE.MathUtils.clamp(
        game.chargeTime / game.maxChargeTime,
        0,
        1
      );

      // チャージが長いほど遠くへ
      const speed = THREE.MathUtils.lerp(game.minSpeed, game.maxSpeed, chargeRatio);

      // カメラ前方向を水平化
      const horizontalDir = getHorizontalForward();

      // 飛ぶ矢を新規生成
      const arrow = createArrowModel();

      // 発射位置は画面中央の少し前
      arrow.position.copy(getMuzzlePosition());

      // 矢じりを進行方向に向ける
      orientArrowHorizontally(arrow, horizontalDir);

      game.scene.add(arrow);

      // 速度
      // 姿勢は水平固定だが、少しだけ上方向速度を足して自然に見せる
      const velocity = horizontalDir.clone().multiplyScalar(speed);
      velocity.y += 1.5 + 2.3 * chargeRatio;

      const arrowData = {
        mesh: arrow,
        velocity,
        age: 0,
        horizontalDir: horizontalDir.clone(),
        stuck: false
      };
      game.flyingArrows.push(arrowData);
      startArrowFollow(arrowData);

      // 装填矢を消す
      game.hasLoadedArrow = false;
      game.shots++;

      const bowGroup = game.bowRoot?.children?.[0];
      if (bowGroup?.userData?.releaseString) {
        bowGroup.userData.releaseString();
      }

      updateLoadedArrowVisual();
      updateBowDraw(0);
      updateHUD();
    }

    function reloadArrow() {
      if (game.isGameOver) return;

      game.hasLoadedArrow = true;
      game.isCharging = false;
      game.chargeTime = 0;
  
      updateLoadedArrowVisual();
      updateBowDraw(0);
      updateHUD();
    }

    // ============================================================
    // 手元の弓矢の見た目更新
    // ============================================================
    function updateLoadedArrowVisual() {
      if (!game.loadedArrow) return;

      game.loadedArrow.visible = game.hasLoadedArrow;

      const bowGroup = game.bowRoot?.children?.[0];

      if (!game.hasLoadedArrow) {
        if (bowGroup?.userData) {
          bowGroup.userData.attachedArrow = null;
        }
        return;
      }

      // まず向きを決める
      orientArrowHorizontally(game.loadedArrow, new THREE.Vector3(0, 0, -1));

      // 再装填時も必ず弓へ再接続する
      if (bowGroup?.userData?.attachArrow) {
         bowGroup.userData.attachArrow(game.loadedArrow);
      }

    }

    function updateBowDraw(ratio) {
      const drawRatio = THREE.MathUtils.clamp(ratio, 0, 1);

      const bowGroup = game.bowRoot?.children?.[0];
      if (bowGroup?.userData?.setCharge) {
        bowGroup.userData.setCharge(drawRatio);
      }
    }

    // ============================================================
    // 方向・姿勢
    // ============================================================
    function getHorizontalForward() {
      const dir = new THREE.Vector3(0, 0, -1);
      dir.applyQuaternion(game.camera.quaternion);

      // 水平成分だけ使う
      dir.y = 0;

      // 真上/真下近くを向いた時の保険
      if (dir.lengthSq() < 1e-6) {
        dir.set(0, 0, -1);
      }

      dir.normalize();
      return dir;
    }

    function getMuzzlePosition() {
      const pos = new THREE.Vector3();
      game.camera.getWorldPosition(pos);

      // 画面中央から少し前へ
      const forward = new THREE.Vector3(0, 0, -1)
        .applyQuaternion(game.camera.quaternion)
        .normalize();

      pos.addScaledVector(forward, 0.85);
  
      // ほんの少し下げて視認性を上げる
      pos.y -= 0.05;

      return pos;
    }

    function getCurrentWindDirection() {
      return WIND_DIRECTIONS[game.wind.directionIndex] || WIND_DIRECTIONS[0];
    }

    function getWindAcceleration() {
      return getCurrentWindDirection().vector
        .clone()
        .multiplyScalar(game.wind.speed * game.windAccelerationScale);
    }

    function randomizeWind() {
      game.wind.directionIndex = Math.floor(Math.random() * WIND_DIRECTIONS.length);
      game.wind.speed = THREE.MathUtils.lerp(1.5, 7.0, Math.random());
    }

    function orientArrowHorizontally(arrow, horizontalDir) {
      // この矢モデルは +X が先端方向
      const from = new THREE.Vector3(1, 0, 0);
      const to = horizontalDir.clone().normalize();

      const q = new THREE.Quaternion().setFromUnitVectors(from, to);
      arrow.quaternion.copy(q);
    }

    function updateTouchLook(dx, dy) {
      if (!isTouchDevice) return;
      if (game.isGameOver) return;
      if (isCameraInCinematicMode()) return;

      game.touchLook.yaw -= dx * game.touchLook.sensitivityX;
      game.touchLook.pitch -= dy * game.touchLook.sensitivityY;

      game.touchLook.pitch = THREE.MathUtils.clamp(
        game.touchLook.pitch,
        -Math.PI / 3,
        Math.PI / 3
      );

      game.camera.rotation.order = "YXZ";
      game.camera.rotation.y = game.touchLook.yaw;
      game.camera.rotation.x = game.touchLook.pitch;
    }

    function isCameraInCinematicMode() {
      return !!game.followArrow || game.isHoldingOnImpact || game.isReturningCamera;
    }

    function startArrowFollow(arrowData) {
      game.savedCameraPosition.copy(game.camera.position);
      game.savedCameraQuaternion.copy(game.camera.quaternion);
      game.followArrow = arrowData;
      game.isHoldingOnImpact = false;
      game.isReturningCamera = false;
      game.impactHoldTime = 0;

      if (game.bowRoot) {
        game.bowRoot.visible = false;
      }
    }

    function startImpactHold() {
      if (!game.followArrow || game.isHoldingOnImpact) return;

      game.isHoldingOnImpact = true;
      game.impactHoldTime = 0;
    }

    function startCameraReturn() {
      if (!isCameraInCinematicMode()) return;

      game.followArrow = null;
      game.isHoldingOnImpact = false;
      game.isReturningCamera = true;
      game.impactHoldTime = 0;
    }

    function finishCameraReturn() {
      game.camera.position.copy(game.savedCameraPosition);
      game.camera.quaternion.copy(game.savedCameraQuaternion);
      game.followArrow = null;
      game.isHoldingOnImpact = false;
      game.isReturningCamera = false;
      game.impactHoldTime = 0;

      if (game.bowRoot) {
        game.bowRoot.visible = true;
      }

      reloadArrow();
    }

    function updateCameraFollow(dt) {
      if (game.followArrow) {
        const arrowData = game.followArrow;

        if (!arrowData.mesh.parent) {
          startCameraReturn();
          return;
        }

        const followDir = arrowData.horizontalDir.clone().normalize();
        const targetPosition = arrowData.mesh.position.clone()
          .addScaledVector(followDir, -game.followOffsetDistance);
        targetPosition.y += game.followOffsetHeight;

        const followAlpha = 1 - Math.exp(-game.followLerpSpeed * dt);
        game.camera.position.lerp(targetPosition, followAlpha);

        const lookTarget = arrowData.mesh.position.clone()
          .addScaledVector(followDir, game.followLookAhead);
        const lookMatrix = new THREE.Matrix4().lookAt(
          game.camera.position,
          lookTarget,
          game.camera.up
        );
        const targetQuaternion = new THREE.Quaternion().setFromRotationMatrix(lookMatrix);
        game.camera.quaternion.slerp(targetQuaternion, followAlpha);

        if (arrowData.stuck) {
          startImpactHold();
          game.impactHoldTime += dt;
        }
        return;
      }

      if (!game.isReturningCamera) {
        if (game.bowRoot) {
          game.bowRoot.visible = true;
        }
        return;
      }

      const returnAlpha = 1 - Math.exp(-game.returnLerpSpeed * dt);
      game.camera.position.lerp(game.savedCameraPosition, returnAlpha);
      game.camera.quaternion.slerp(game.savedCameraQuaternion, returnAlpha);

      if (
        game.camera.position.distanceToSquared(game.savedCameraPosition) < 1e-4 &&
        game.camera.quaternion.angleTo(game.savedCameraQuaternion) < 0.01
      ) {
        finishCameraReturn();
      }
    }

    // ============================================================
    // 当たり判定 / スコア
    // ============================================================
    function checkTargetHit(prevPos, nextPos) {
      const center = game.targetFace.getWorldPosition(new THREE.Vector3());

      // 的の法線
      const normal = new THREE.Vector3(0, 0, 1)
        .applyQuaternion(game.targetFace.getWorldQuaternion(new THREE.Quaternion()))
        .normalize();

      const d1 = prevPos.clone().sub(center).dot(normal);
      const d2 = nextPos.clone().sub(center).dot(normal);

      // 平面を跨いでいなければヒットしない
      if (d1 * d2 > 0) return null;

      const t = d1 / (d1 - d2);
      if (t < 0 || t > 1) return null;

      const hitPos = prevPos.clone().lerp(nextPos, t);

      const offset = hitPos.clone().sub(center);
      const planar = offset.sub(normal.clone().multiplyScalar(offset.dot(normal)));
      const dist = planar.length();

      if (dist <= game.targetRadius) {
        return { hitPos, dist };
      }

      return null;
    }

    function scoreFromDistance(dist) {
      const normalized = 1 - dist / game.targetRadius;
      return Math.max(1, Math.round(normalized * 10));
    }

    function triggerHitCelebration() {
      if (!celebrationLayer) return;

      while (celebrationLayer.childElementCount >= MAX_ACTIVE_CONFETTI_BURSTS) {
        celebrationLayer.firstElementChild?.remove();
      }

      const burst = document.createElement("div");
      burst.className = "confetti-burst";

      let maxLifetimeMs = 0;

      for (let i = 0; i < CONFETTI_PIECES_PER_HIT; i++) {
        const piece = document.createElement("span");
        piece.className = "confetti-piece";

        const width = 8 + Math.random() * 8;
        const height = 12 + Math.random() * 12;
        const durationMs = 2400 + Math.random() * 1300;
        const delayMs = Math.random() * 180;
        const driftX = -18 + Math.random() * 36;
        const fallDistance = 85 + Math.random() * 30;
        const rotateStart = -160 + Math.random() * 320;
        const rotateEnd = rotateStart + (Math.random() < 0.5 ? -1 : 1) * (540 + Math.random() * 540);
        const left = Math.random() * 100;
        const color = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];

        piece.style.setProperty("--confetti-width", `${width.toFixed(1)}px`);
        piece.style.setProperty("--confetti-height", `${height.toFixed(1)}px`);
        piece.style.setProperty("--confetti-left", `${left.toFixed(2)}vw`);
        piece.style.setProperty("--confetti-color", color);
        piece.style.setProperty("--confetti-duration", `${durationMs.toFixed(0)}ms`);
        piece.style.setProperty("--confetti-delay", `${delayMs.toFixed(0)}ms`);
        piece.style.setProperty("--confetti-drift-x", `${driftX.toFixed(2)}vw`);
        piece.style.setProperty("--confetti-fall-distance", `${fallDistance.toFixed(2)}vh`);
        piece.style.setProperty("--confetti-rotate-start", `${rotateStart.toFixed(1)}deg`);
        piece.style.setProperty("--confetti-rotate-end", `${rotateEnd.toFixed(1)}deg`);

        burst.appendChild(piece);
        maxLifetimeMs = Math.max(maxLifetimeMs, durationMs + delayMs);
      }

      celebrationLayer.appendChild(burst);
      window.setTimeout(() => burst.remove(), maxLifetimeMs + 120);
    }

    function startGame() {
      randomizeWind();
      game.hasStarted = true;
      game.timeRemaining = game.timeLimit;
      updateHUD();
    }

// ============================================================
// スコア送信（PowerShell連携）
// ※失敗しても絶対にエラーにしない
// ============================================================
async function sendScoreToExternal(score) {
  if (!ENABLE_SCORE_POST) return;

  try {
    await fetch(SCORE_POST_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        score: score,
        timestamp: new Date().toISOString()
      })
    });
  } catch (e) {
    // ★重要：完全に無視（エラーにしない）
    console.warn("スコア送信失敗（無視）", e);
  }
}

    function endGame() {
      if (game.isGameOver) return;

      game.isGameOver = true;
      game.timeRemaining = 0;
      game.isCharging = false;
      game.chargeTime = 0;
      finishCameraReturn();
      overlay.classList.add("hidden");
      const isCelebration = game.score >= 11;
      gameOverScreen.textContent =
        isCelebration ? "CONGRATULATIONS!!" : "GAME OVER";
      gameOverScreen.classList.toggle("isCelebration", isCelebration);
      gameOverScreen.classList.add("visible");

      updateBowDraw(0);
      updateLoadedArrowVisual();
      updateHUD();

      if (game.controls.isLocked) {
        game.controls.unlock();
      }

      // スコア送信（非同期・失敗しても無視）
      sendScoreToExternal(game.score);
    }

    function updateTimer(dt) {
      if (!game.hasStarted || game.isGameOver) return;

      game.timeRemaining = Math.max(0, game.timeRemaining - dt);

      if (game.timeRemaining <= 0) {
        endGame();
      }
    }

    function formatTimeRemaining(seconds) {
      return `${Math.max(0, Math.ceil(seconds))}s`;
    }

    // ============================================================
    // HUD
    // ============================================================
    function updateHUD() {
      const ratio = THREE.MathUtils.clamp(game.chargeTime / game.maxChargeTime, 0, 1);
      const percent = Math.round(ratio * 100);
      const windDirection = getCurrentWindDirection();
      const windText = game.hasStarted
        ? `${windDirection.label} ${windDirection.symbol} / ${game.wind.speed.toFixed(1)} m/s`
        : "-";
      const cameraMode = game.followArrow
        ? game.isHoldingOnImpact
          ? "WAIT"
          : "FOLLOW"
        : game.isReturningCamera
          ? "RETURN"
          : "PLAYER";

      chargeBar.style.width = (game.isCharging ? percent : 0) + "%";

      hudText.innerHTML = `
        <div>Loaded: <b>${game.hasLoadedArrow ? "YES" : "NO"}</b></div>
        <div>Charge: <b>${game.isCharging ? percent + "%" : "-"}</b></div>
        <div>Camera: <b>${cameraMode}</b></div>
        <div>Shots: <b>${game.shots}</b> / Hits: <b>${game.hits}</b> / Score: <b>${game.score}</b></div>
        <div>Time Limit: <b>${formatTimeRemaining(game.timeRemaining)}</b></div>
        <div>Wind: <b>${windText}</b></div>
      `;
    }

    // ============================================================
    // 更新
    // ============================================================
    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(0.033, game.clock.getDelta());
      const elapsed = game.clock.elapsedTime;

      if (!game.isGameOver) {

        // 実装済みの弓アニメーションを毎フレーム呼ぶ
        if (game.bowRoot?.children?.[0]?.userData?.updateBowAnimation) {
            game.bowRoot.children[0].userData.updateBowAnimation(dt, elapsed);
        }
        updateCharge(dt);
        updateFlyingArrows(dt);
        updateCameraFollow(dt);
        updateTimer(dt);
      }

      updateHUD();

      game.renderer.render(game.scene, game.camera);
    }

    function updateCharge(dt) {
      if (!game.isCharging) return;

      game.chargeTime = Math.min(game.maxChargeTime, game.chargeTime + dt);

      const ratio = game.chargeTime / game.maxChargeTime;
      updateBowDraw(ratio);
    }

    function updateFlyingArrows(dt) {
      for (let i = game.flyingArrows.length - 1; i >= 0; i--) {
        const arrowData = game.flyingArrows[i];

        if (arrowData.stuck) continue;

        arrowData.age += dt;

        // 長く飛びすぎた矢は削除
        if (arrowData.age > game.maxLifetime) {
          game.scene.remove(arrowData.mesh);
          game.flyingArrows.splice(i, 1);
          continue;
        }

        const prevPos = arrowData.mesh.position.clone();

        // 重力反映
        arrowData.velocity.addScaledVector(game.gravity, dt);
        arrowData.velocity.addScaledVector(getWindAcceleration(), dt);

        const horizontalVelocity = arrowData.velocity.clone();
        horizontalVelocity.y = 0;
        if (horizontalVelocity.lengthSq() > 1e-6) {
          arrowData.horizontalDir.copy(horizontalVelocity.normalize());
        }

        // 位置更新
        arrowData.mesh.position.addScaledVector(arrowData.velocity, dt);

        const nextPos = arrowData.mesh.position.clone();

        // --------------------------------------------------------
        // 要件:
        // 矢は「地面と平行の向き」のまま
        // 矢じりは「現在の進行方向（水平成分）」を向く
        //
        // つまり、落下しても矢は上下に傾けない。
        // 風で横流れしても、向きは水平のまま追従する。
        // --------------------------------------------------------
        orientArrowHorizontally(arrowData.mesh, arrowData.horizontalDir);

        // 地面に落ちたら停止
        if (arrowData.mesh.position.y <= 0.05) {
          arrowData.mesh.position.y = 0.05;
          arrowData.velocity.set(0, 0, 0);
          arrowData.stuck = true;
          continue;
        }

        // 的ヒット判定
        const hit = checkTargetHit(prevPos, nextPos);
        if (hit) {
          arrowData.mesh.position.copy(hit.hitPos);
          arrowData.velocity.set(0, 0, 0);
          arrowData.stuck = true;

          game.hits++;
          game.score += scoreFromDistance(hit.dist);
          triggerHitCelebration();
        }
      }
    }
  </script>
</body>
