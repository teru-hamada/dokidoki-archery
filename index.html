<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ドキドキアーチェリー</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #87ceeb;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    #hud {
      position: fixed;
      left: 12px;
      top: 12px;
      z-index: 20;
      min-width: 290px;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.45);
      color: #fff;
      line-height: 1.55;
      user-select: none;
      box-shadow: 0 8px 24px rgba(0,0,0,.18);
    }

    .hudLabel {
      display: inline-block;
      width: 80px;
      text-align: left;
    }

    .powerRow {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 4px;
    }

    .powerLabel {
      white-space: nowrap;
      flex-shrink: 0;
    }

    #chargeWrap {
      flex: 1;
      height: 24px;
      border-radius: 999px;
      overflow: visible;
      background: rgba(255,255,255,.16);
      border: 1px solid rgba(255,255,255,.2);
      position: relative;
    }

    #chargeBar {
      width: 0%;
      height: 100%;
      background: rgba(255,255,255,.92);
      transition: width 0.03s linear;
      border-radius: 999px;
    }

    #chargeText {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 13px;
      font-weight: 700;
      pointer-events: none;
      mix-blend-mode: difference;
      color: #fff;
    }

    #crosshair {
      position: fixed;
      left: 50%;
      top: 50%;
      width: 18px;
      height: 18px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 20;
      filter: drop-shadow(0 1px 1px rgba(0,0,0,.35));
    }

    #crosshair::before,
    #crosshair::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255,255,255,.96);
      border-radius: 2px;
    }

    #crosshair::before { width: 18px; height: 2px; }
    #crosshair::after  { width: 2px;  height: 18px; }

    #overlay {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(0,0,0,.55);
      color: #fff;
      z-index: 30;
      text-align: center;
      padding: 20px;
    }

    #overlay.hidden {
      display: none;
    }

    #gameOverScreen {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      z-index: 40;
      pointer-events: none;
      color: #fff;

      padding: 24px 16px;
      box-sizing: border-box;
      text-align: center;
      margin: 0 auto;
      max-width: 100vw;

      /* 改行させない */
      white-space: nowrap;
      overflow-wrap: normal;
      word-break: normal;
      line-height: 1.05;

      /* 少し控えめに */
      font-size: clamp(22px, 7vw, 120px);
      font-weight: 800;
      letter-spacing: 0.04em;
      text-shadow: 0 10px 28px rgba(0, 0, 0, 0.45);
    }

    #gameOverScreen.visible {
      display: grid;
    }

    #gameOverScreen.isCelebration {
      color: #f7fbff;
      text-shadow:
        0 0 10px rgba(180, 242, 255, 0.95),
        0 0 22px rgba(90, 210, 255, 0.8),
        0 0 42px rgba(76, 146, 255, 0.68),
        0 0 64px rgba(185, 120, 255, 0.42),
        0 10px 28px rgba(0, 0, 0, 0.32);
      animation: congratulations-neon 2.2s ease-in-out infinite alternate;
    }

    @media (max-width: 640px) {
      #gameOverScreen {
        padding: 20px 12px;
        font-size: clamp(18px, 6.2vw, 40px);
        letter-spacing: 0.02em;
      }
    }

    #celebrationLayer {
      position: fixed;
      inset: 0;
      z-index: 15;
      overflow: hidden;
      pointer-events: none;
    }

    .confetti-burst {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .confetti-piece {
      position: absolute;
      top: -18vh;
      width: var(--confetti-width, 10px);
      height: var(--confetti-height, 18px);
      left: var(--confetti-left, 50vw);
      opacity: 0;
      border-radius: 2px;
      background:
        linear-gradient(
          135deg,
          rgba(255,255,255,0.85) 0%,
          rgba(255,255,255,0.18) 28%,
          var(--confetti-color, #ffffff) 28%,
          var(--confetti-color, #ffffff) 100%
        );
      box-shadow: 0 0 10px rgba(255,255,255,0.25);
      animation: confetti-fall var(--confetti-duration, 3s) ease-out var(--confetti-delay, 0s) forwards;
      transform: translate3d(0, 0, 0) rotate(var(--confetti-rotate-start, 0deg));
      transform-origin: center;
      will-change: transform, opacity;
    }

    @keyframes confetti-fall {
      0% {
        opacity: 0;
        transform: translate3d(0, -10vh, 0) rotate(var(--confetti-rotate-start, 0deg)) scale(0.8);
      }

      12% {
        opacity: 1;
      }

      100% {
        opacity: 0;
        transform:
          translate3d(var(--confetti-drift-x, 0vw), var(--confetti-fall-distance, 110vh), 0)
          rotate(var(--confetti-rotate-end, 540deg))
          scale(1.05);
      }
    }

    @keyframes congratulations-neon {
      0% {
        text-shadow:
          0 0 8px rgba(180, 242, 255, 0.8),
          0 0 16px rgba(90, 210, 255, 0.62),
          0 0 30px rgba(76, 146, 255, 0.5),
          0 0 48px rgba(185, 120, 255, 0.28),
          0 10px 28px rgba(0, 0, 0, 0.32);
      }

      100% {
        text-shadow:
          0 0 12px rgba(205, 248, 255, 1),
          0 0 26px rgba(120, 224, 255, 0.88),
          0 0 48px rgba(89, 170, 255, 0.72),
          0 0 72px rgba(198, 132, 255, 0.42),
          0 10px 28px rgba(0, 0, 0, 0.32);
      }
    }

    .card {
      max-width: 780px;
      padding: 20px;
      border-radius: 18px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(8px);
    }

    .overlayStack {
      display: grid;
      justify-items: center;
      gap: 16px;
    }

    .overlayTitle {
      padding: 14px 28px 18px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(71,142,230,.96) 0%, rgba(33,94,184,.96) 50%, rgba(17,65,143,.96) 100%);
      border: 1px solid rgba(255,255,255,.28);
      box-shadow:
        0 12px 24px rgba(0,0,0,.28),
        inset 0 1px 0 rgba(255,255,255,.45),
        inset 0 -2px 0 rgba(10,41,96,.55);
    }

    .overlayTitle h1 {
      margin: 0;
      font-size: clamp(36px, 6vw, 56px);
      line-height: 1.05;
      letter-spacing: .08em;
      color: #f7fbff;
      text-shadow:
        0 1px 0 #dcecff,
        0 2px 0 #b8d8ff,
        0 3px 0 #8bb6f2,
        0 4px 0 #4d80d2,
        0 10px 18px rgba(0,0,0,.34);
    }

    .card p {
      margin: 8px 0;
      opacity: .96;
    }

    .kbd {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 8px;
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.2);
    }

    #errorBox {
      margin-top: 12px;
      text-align: left;
      white-space: pre-wrap;
      padding: 10px;
      border-radius: 10px;
      background: rgba(0,0,0,.3);
      border: 1px solid rgba(255,255,255,.15);
      display: none;
      font-size: 12px;
    }
  </style>

  <!-- import map で "three" の参照先を明示 -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="hud">
    <div id="hudText"></div>
  </div>

  <div id="crosshair"></div>
  <div id="celebrationLayer" aria-hidden="true"></div>

  <div id="overlay">
    <div class="overlayStack">
      <div class="overlayTitle">
        <h1>ドキドキアーチェリー</h1>
      </div>
      <div class="card">
        <p>画面クリックで開始（マウス固定）</p>
        <p>
          <span class="kbd">左クリック長押し</span> でチャージ →
          <span class="kbd">左クリックを離す</span> で発射
        </p>
        <p>
          矢が止まったら <span class="kbd">左クリック</span> で元の視点に戻る /
          <span class="kbd">ESC</span> でマウス解除
        </p>
        <div id="errorBox"></div>
      </div>
    </div>
  </div>

  <div id="gameOverScreen">GAME OVER</div>

  <script type="module">
    import * as THREE from "three";
    import { PointerLockControls } from "three/addons/controls/PointerLockControls.js";

    // ============================================================
    // 3D アーチェリーゲーム
    // ------------------------------------------------------------
    // 役割ごとにメソッド分けして、後で修正しやすい構成にしている
    //
    // createCore()         : Scene / Camera / Renderer / Controls
    // createEnvironment()  : 空・地面・照明・背景演出
    // createTargetSystem() : 的
    // createBowSystem()    : 弓と装填中の矢
    // createArrowModel()   : 飛ぶ矢の共通モデル
    // setupInput()         : 入力処理
    // update*()            : 毎フレーム更新
    // ============================================================

    // ------------------------------------------------------------
    // DOM
    // ------------------------------------------------------------
    const overlay = document.getElementById("overlay");
    const gameOverScreen = document.getElementById("gameOverScreen");
    const errorBox = document.getElementById("errorBox");
    const hudText = document.getElementById("hudText");
    const celebrationLayer = document.getElementById("celebrationLayer");
    const WIND_DIRECTIONS = [
      {
        label: "左",
        symbol: "←",
        vector: new THREE.Vector3(-1, 0, 0)
      },
      {        label: "右",
        symbol: "→",
        vector: new THREE.Vector3(1, 0, 0)
      }
    ];
    const CONFETTI_COLORS = [
      "#ffe066",
      "#ff8fab",
      "#7bdff2",
      "#b8f2a1",
      "#cdb4ff",
      "#ffffff"
    ];
    const CONFETTI_PIECES_PER_HIT = 40;
    const MAX_ACTIVE_CONFETTI_BURSTS = 3;
    const isTouchDevice =
      ("ontouchstart" in window) ||
      (navigator.maxTouchPoints > 0) ||
      (navigator.msMaxTouchPoints > 0);

    function showError(message) {
      errorBox.style.display = "block";
      errorBox.textContent = message;
    }

    // ゼロ風・80%チャージ時にセンターへ寄せるための基準上向き補正
    const DEFAULT_ARROW_PITCH_BIAS = 0.012;

    // ------------------------------------------------------------
    // グローバル状態
    // ------------------------------------------------------------
    const game = {
      scene: null,
      camera: null,
      renderer: null,
      controls: null,
      clock: new THREE.Clock(),

      // ワールド
      targetFace: null,
      targetRadius: 0.8,

      // 風のエフェクト
      windFX: {
        streaks: [],
        textures: {
          streak: null
        }
      },

      // 手元の弓まわり
      bowRoot: null,
      bowString: null,
      loadedArrow: null,

      // ゲーム状態
      isCharging: false,
      chargeTime: 0,
      maxChargeTime: 1.7,
      hasLoadedArrow: true,

      shots: 0,
      hits: 0,
      score: 0,
      hasStarted: false,
      isGameOver: false,
      timeLimit: 30,
      timeRemaining: 30,

      // 発射済み矢
      flyingArrows: [],

      // 追従カメラ
      followArrow: null,
      isHoldingOnImpact: false,
      isReturningCamera: false,
      impactHoldTime: 0,
      savedCameraPosition: new THREE.Vector3(),
      savedCameraQuaternion: new THREE.Quaternion(),
      followOffsetDistance: 3.2,
      followOffsetHeight: 0.65,
      followLookAhead: 5.0,
      followLerpSpeed: 6.5,
      returnLerpSpeed: 5.5,

      // スマホ用視点操作
      touchLook: {
        active: false,
        lastX: 0,
        lastY: 0,
        yaw: 0,
        pitch: 0,
        sensitivityX: 0.0032,
        sensitivityY: 0.0024
      },
      
      // 調整値
      gravity: new THREE.Vector3(0, -9.8, 0),
      windAccelerationScale: 1.35,
      wind: {
        directionIndex: 0,
        speed: 0
      },
      minSpeed: 18,
      maxSpeed: 56,
      maxLifetime: 10.0
      
    };
    
    // ============================================================
    // 外部連携設定（PowerShell受信用）
    // ============================================================
    const SCORE_POST_URL = "http://localhost:5000/score"; // PowerShell側
    const ENABLE_SCORE_POST = true; // ON/OFF切り替え

    // ------------------------------------------------------------
    // 起動
    // ------------------------------------------------------------
    try {
      init();
      animate();
    } catch (err) {
      showError("初期化エラー:\n" + (err?.stack || err?.message || String(err)));
    }

    // ============================================================
    // 初期化
    // ============================================================
    function init() {
      createCore();
      createEnvironment();
      createWindFX();
      createTargetSystem();
      createBowSystem();
      setupInput();
      setupResize();
      updateHUD();
    }

    // ============================================================
    // Core: Scene / Camera / Renderer / Controls
    // ============================================================
    function createCore() {
      // シーン
      game.scene = new THREE.Scene();
      game.scene.background = new THREE.Color(0x87ceeb); // 青空

      // カメラ
      game.camera = new THREE.PerspectiveCamera(
        70,
        window.innerWidth / window.innerHeight,
        0.01,
        800
      );
      game.camera.position.set(0, 1.6, 8);
      game.camera.rotation.order = "YXZ";
      game.touchLook.yaw = game.camera.rotation.y;
      game.touchLook.pitch = game.camera.rotation.x;

      game.savedCameraPosition.copy(game.camera.position);
      game.savedCameraQuaternion.copy(game.camera.quaternion);

      // レンダラ
      game.renderer = new THREE.WebGLRenderer({ antialias: true });
      game.renderer.setSize(window.innerWidth, window.innerHeight);
      game.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      game.renderer.domElement.style.touchAction = "none";
      document.body.appendChild(game.renderer.domElement);

      // 視点操作
      game.controls = new PointerLockControls(game.camera, document.body);

      // スマホ向け説明文へ差し替え
      if (isTouchDevice) {
        const card = document.querySelector("#overlay .card");
        if (card) {
          card.innerHTML = `
            <p>画面タップで開始</p>
            <p>
              <span class="kbd">長押し</span> でチャージ →
              <span class="kbd">指を離す</span> で発射
            </p>
            <p>
              <span class="kbd">ドラッグ</span> で視点移動 /
              矢が止まったら <span class="kbd">タップ</span> で元の視点に戻る
            </p>
            <div id="errorBox"></div>
          `;
        }
      }

      function handleOverlayStart(e) {
        if (game.isGameOver) return;

        if (isTouchDevice) {
          e.preventDefault();
          e.stopPropagation();

          overlay.classList.add("hidden");

          if (!game.hasStarted) {
            startGame();
          }
          return;
        }

        game.controls.lock();
      }

      overlay.addEventListener("click", handleOverlayStart);
      overlay.addEventListener("touchstart", handleOverlayStart, { passive: false });

      game.controls.addEventListener("lock", () => {
        overlay.classList.add("hidden");

        if (!game.hasStarted) {
          startGame();
        }
      });

      game.controls.addEventListener("unlock", () => {
        if (!game.isGameOver && !isTouchDevice) {
          overlay.classList.remove("hidden");
        }
      });
    }

    // ============================================================
    // Environment: 背景 / 地面 / 照明 / 背景デザイン
    // ============================================================
    function createEnvironment() {
      createLights();
      createGround();
      setGradientSky()
      createSkyDecoration();
      createMountains()
    }

    function createWindFX() {
      createWindFXTextures();
      createWindStreakSprites();
    }

    function createWindFXTextures() {
      const streakCanvas = document.createElement("canvas");
      streakCanvas.width = 128;
      streakCanvas.height = 32;
      const sctx = streakCanvas.getContext("2d");

      const streakGrad = sctx.createLinearGradient(0, 16, 128, 16);
      streakGrad.addColorStop(0, "rgba(255,255,255,0)");
      streakGrad.addColorStop(0.18, "rgba(255,255,255,0.18)");
      streakGrad.addColorStop(0.50, "rgba(255,255,255,0.55)");
      streakGrad.addColorStop(0.82, "rgba(255,255,255,0.18)");
      streakGrad.addColorStop(1, "rgba(255,255,255,0)");

      sctx.fillStyle = streakGrad;
      sctx.beginPath();
      sctx.roundRect(0, 10, 128, 12, 6);
      sctx.fill();

      game.windFX.textures.streak = new THREE.CanvasTexture(streakCanvas);
    }

    function createWindStreakSprites() {
      const count = 40;

      for (let i = 0; i < count; i++) {
        const material = new THREE.SpriteMaterial({
          map: game.windFX.textures.streak,
          transparent: true,
          opacity: 0,
          depthWrite: false
        });

        const sprite = new THREE.Sprite(material);
        game.scene.add(sprite);

        // x を広げて横方向の流れるエリアを拡大
        // y を広げて上の空間まで風を出す
        // z を広げて奥まで風を出す
        // width を伸ばして筋を長くする
        // height を上げて少し太くする
        const p = {
          sprite,
          x: (Math.random() - 0.5) * 160,
          y: 0.2 + Math.random() * 5.2,
          z: -3 - Math.random() * 65,
          width: 2.8 + Math.random() * 5.0,
          height: 0.12 + Math.random() * 0.22,
          speedScale: 0.8 + Math.random() * 1.0,
          swayPhase: Math.random() * Math.PI * 2,

          // ゆらぎ追加
          driftPhase: Math.random() * Math.PI * 2,
          stretchPhase: Math.random() * Math.PI * 2,
          swayAmpY: 0.03 + Math.random() * 0.05,
          swayAmpZ: 0.04 + Math.random() * 0.10,
          speedJitter: 0.85 + Math.random() * 0.35
        };

        sprite.position.set(p.x, p.y, p.z);
        sprite.scale.set(p.width, p.height, 1);

        game.windFX.streaks.push(p);
      }
    }

    function resetWindFXParticleX(p, dirSign, rangeX = 90) {
      p.x = dirSign > 0
        ? -rangeX - Math.random() * 8
        :  rangeX + Math.random() * 8;
    }

    function updateWindFX(dt, elapsed) {
      if (!game.windFX) return;
      if (typeof getCurrentWindDirection !== "function") return;

      const windDir = getCurrentWindDirection();
      if (!windDir?.vector) return;

      const dirSign = windDir.vector.x >= 0 ? 1 : -1;
      const windSpeed = game.hasStarted ? game.wind.speed : 0;
      const visibility = THREE.MathUtils.clamp(windSpeed / 7.0, 0, 1);

      updateWindStreaks(dt, elapsed, dirSign, windSpeed, visibility);
    }

    function updateWindStreaks(dt, elapsed, dirSign, windSpeed, visibility) {
      const activeCount = Math.floor(3 + visibility * game.windFX.streaks.length);

      for (let i = 0; i < game.windFX.streaks.length; i++) {
        const p = game.windFX.streaks[i];
        const active = i < activeCount;

        p.sprite.visible = active;
        if (!active) continue;

        // 速度にゆるい揺らぎを入れる
        const speedWave =
          1 +
          Math.sin(elapsed * (1.6 + p.speedScale * 0.7) + p.driftPhase) * 0.16 +
          Math.sin(elapsed * (3.4 + p.speedScale * 0.4) + p.driftPhase * 1.7) * 0.06;

        const moveSpeed =
          (1.2 + windSpeed * 2.6) *
          p.speedScale *
          p.speedJitter *
          speedWave;

        p.x += dirSign * moveSpeed * dt;

        if (dirSign > 0 && p.x > 90) resetWindFXParticleX(p, dirSign, 90);
        if (dirSign < 0 && p.x < -90) resetWindFXParticleX(p, dirSign, 90);

        // 上下だけでなく奥行きにも微妙な揺れ
        const bobY =
          Math.sin(elapsed * (1.2 + p.speedScale) + p.swayPhase) * p.swayAmpY +
          Math.sin(elapsed * (2.7 + p.speedScale * 0.6) + p.swayPhase * 1.9) * p.swayAmpY * 0.45;

        const bobZ =
          Math.sin(elapsed * (1.8 + p.speedScale * 0.5) + p.driftPhase) * p.swayAmpZ;

        // 長さをわずかに伸び縮み
        const stretch =
          1 +
          Math.sin(elapsed * (2.2 + p.speedScale * 0.5) + p.stretchPhase) * 0.10;

        p.sprite.position.set(p.x, p.y + bobY, p.z + bobZ);
        p.sprite.material.opacity = 0.16 + visibility * 0.28;

        p.sprite.scale.set(
          p.width * (1.9 + visibility * 0.8) * stretch,
          p.height * (2.8 + visibility * 1.1) * (0.96 + (2 - stretch) * 0.04),
          1
        );
      }
    }

    function createLights() {
      // 半球ライトで空と地面からの柔らかい光を表現
      const hemi = new THREE.HemisphereLight(0xffffff, 0x335566, 0.95);
      game.scene.add(hemi);

      // 方向ライトで立体感を足す
      const dir = new THREE.DirectionalLight(0xffffff, 0.9);
      dir.position.set(8, 14, 4);
      game.scene.add(dir);
    }

    function createGround() {
      const canvas = document.createElement("canvas");
      canvas.width = 1024;
      canvas.height = 1024;

      const ctx = canvas.getContext("2d");

      // ベースの芝色
      ctx.fillStyle = "#4f9444";
      ctx.fillRect(0, 0, 1024, 1024);

      // 大きめの色ムラ（芝の濃淡）
      for (let i = 0; i < 3200; i++) {
        const x = Math.random() * 1024;
        const y = Math.random() * 1024;
        const r = 16 + Math.random() * 18;
        const g = 85 + Math.random() * 60;
        const b = 10 + Math.random() * 16;
        const size = 10 + Math.random() * 24;

        ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${0.04 + Math.random() * 0.05})`;
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fill();
      }

      // 細かい粒感
      for (let i = 0; i < 70000; i++) {
        const x = Math.random() * 1024;
        const y = Math.random() * 1024;
        const r = 16 + Math.random() * 22;
        const g = 92 + Math.random() * 82;
        const b = 8 + Math.random() * 18;

        ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
        ctx.fillRect(x, y, 1.5, 1.5);
      }

      // 短い芝の筋
      for (let i = 0; i < 32000; i++) {
        const x = Math.random() * 1024;
        const y = Math.random() * 1024;
        const len = 2 + Math.random() * 5;
        const tilt = (Math.random() - 0.5) * 0.9;

        ctx.strokeStyle = `rgba(${20 + Math.random() * 25}, ${120 + Math.random() * 90}, ${12 + Math.random() * 20}, ${0.20 + Math.random() * 0.16})`;
        ctx.lineWidth = 1;

        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + tilt * 2.5, y - len);
        ctx.stroke();
      }

      // 土っぽい色を少し混ぜる
      for (let i = 0; i < 5000; i++) {
        const x = Math.random() * 1024;
        const y = Math.random() * 1024;

        ctx.fillStyle = `rgba(${70 + Math.random() * 35}, ${60 + Math.random() * 25}, ${35 + Math.random() * 20}, ${0.04 + Math.random() * 0.05})`;
        ctx.fillRect(x, y, 2, 2);
      }

      const texture = new THREE.CanvasTexture(canvas);
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.RepeatWrapping;
      texture.repeat.set(110, 110);

      const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(1000, 1000),
        new THREE.MeshStandardMaterial({
          map: texture,
          roughness: 1.0,
          metalness: 0.0
        })
      );

      ground.rotation.x = -Math.PI / 2;
      ground.position.y = 0;

      game.scene.add(ground);
    }

    // ============================================================
    // Target: 的の生成
    // ============================================================
    function createTargetSystem() {
      const targetGroup = new THREE.Group();
      game.targetRadius = 0.8;
      const targetThickness = 0.14;
      const targetCenter = new THREE.Vector3(0, 1.6, -30);

      // 的の正面
      const face = new THREE.Mesh(
        new THREE.CircleGeometry(game.targetRadius, 64),
        new THREE.MeshStandardMaterial({
          map: createTargetTexture(),
          roughness: 0.92
        })
      );
      face.position.copy(targetCenter);
      face.position.z += targetThickness / 2 + 0.01;
      targetGroup.add(face);

      // 的の厚み
      const back = new THREE.Mesh(
        new THREE.CylinderGeometry(game.targetRadius, game.targetRadius, targetThickness, 48, 1, true),
        new THREE.MeshStandardMaterial({
          color: 0xd2b48c,
          roughness: 1.0
        })
      );
      back.position.copy(targetCenter);
      back.rotation.x = Math.PI / 2;
      targetGroup.add(back);

      // 三脚スタンド
      const standMaterial = new THREE.MeshStandardMaterial({
        color: 0x6b4f2a,
        roughness: 1.0
      });

      // 2点を結ぶ支柱を作る
      function addSupportBetweenPoints(start, end, radius = 0.03) {
        const dir = new THREE.Vector3().subVectors(end, start);
        const length = dir.length();

        const leg = new THREE.Mesh(
          new THREE.CylinderGeometry(radius, radius * 1.15, length, 12),
          standMaterial
        );

        const mid = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
        leg.position.copy(mid);

        // Cylinder は Y 軸方向が長手なので、start→end に向ける
        leg.quaternion.setFromUnitVectors(
          new THREE.Vector3(0, 1, 0),
          dir.clone().normalize()
        );

        targetGroup.add(leg);
      }

      // 支柱の合体点（的の上部中央）
      const topJointPos = new THREE.Vector3(0.00, 2.28, -30.10);

      // 前面左支柱：的の表側左
      const frontLeftFoot  = new THREE.Vector3(-0.70, 0.00, -29.98);

      // 前面右支柱：的の表側右
      const frontRightFoot = new THREE.Vector3( 0.70, 0.00, -29.98);

      // 後部中央支柱：後ろから支える
      const rearCenterFoot = new THREE.Vector3(0.00, 0.00, -30.95);

      // 3本の支柱
      addSupportBetweenPoints(frontLeftFoot,  topJointPos, 0.060);
      addSupportBetweenPoints(frontRightFoot, topJointPos, 0.060);
      addSupportBetweenPoints(rearCenterFoot, topJointPos, 0.066);

      // 上部ジョイント
      const tripodJoint = new THREE.Mesh(
        new THREE.SphereGeometry(0.085, 16, 16),
        standMaterial
      );
      tripodJoint.position.copy(topJointPos);
      targetGroup.add(tripodJoint);

      game.targetFace = face;
      game.scene.add(targetGroup);
    }

    function createTargetTexture(size = 1024) {
      const canvas = document.createElement("canvas");
      canvas.width = canvas.height = size;
      const ctx = canvas.getContext("2d");

      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, size, size);

      const cx = size / 2;
      const cy = size / 2;

      // アーチェリーの的 (FITA/WA 標準ターゲット配色)
      // 外側から中心に向かって描画
      const unit = (size / 2) / 10;

      const rings = [
        // White (1, 2)
        { r: unit * 10, color: "#ffffff", stroke: "#d0d0d0" },
        { r: unit * 9,  color: "#ffffff", stroke: "#d0d0d0" },
        // Black (3, 4)
        { r: unit * 8,  color: "#111111", stroke: "#555555" },
        { r: unit * 7,  color: "#111111", stroke: "#555555" },
        // Blue (5, 6)
        { r: unit * 6,  color: "#0099ff", stroke: "rgba(0,0,0,0.2)" },
        { r: unit * 5,  color: "#0099ff", stroke: "rgba(0,0,0,0.2)" },
        // Red (7, 8)
        { r: unit * 4,  color: "#ff0000", stroke: "rgba(0,0,0,0.2)" },
        { r: unit * 3,  color: "#ff0000", stroke: "rgba(0,0,0,0.2)" },
        // Gold (9, 10)
        { r: unit * 2,  color: "#ffe500", stroke: "rgba(160,140,0,0.4)" },
        { r: unit * 1,  color: "#ffe500", stroke: "rgba(160,140,0,0.4)" }
      ];

      ctx.lineWidth = size * 0.003; // 少し細めの線

      for (const ring of rings) {
        ctx.beginPath();
        ctx.arc(cx, cy, ring.r, 0, Math.PI * 2);
        ctx.closePath();
        
        ctx.fillStyle = ring.color;
        ctx.fill();
        
        ctx.strokeStyle = ring.stroke;
        ctx.stroke();
      }

      // 中心点 (+)
      ctx.fillStyle = "#222222";
      ctx.font = `bold ${unit * 0.6}px sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("+", cx, cy);

      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      texture.minFilter = THREE.LinearMipmapLinearFilter;
      texture.magFilter = THREE.LinearFilter;
      texture.generateMipmaps = true;
      texture.anisotropy = game.renderer.capabilities.getMaxAnisotropy();
      return texture;
    }

    function createBowSystem() {

      // 弓本体
      const bowGroup = createBowModel();
      bowRoot.add(bowGroup);

      game.bowRoot = bowRoot;

      if (bowGroup?.userData?.attachArrow) {

      updateLoadedArrowVisual();
      updateBowDraw(0);

    function applyResponsiveBowLayout() {
      if (!game.bowRoot) return;

      const isPortrait = window.innerHeight > window.innerWidth;
      const isMobilePortrait = isTouchDevice && isPortrait;

      if (isMobilePortrait) {
        // 縦画面スマホでは弓を少し内側に寄せて小さくする
        game.bowRoot.position.set(-0.18, -0.10, 0.00);
        game.bowRoot.scale.set(0.82, 0.82, 0.82);

        // 少しだけ広く見せる
        game.camera.fov = 78;
      } else {
        // それ以外は従来どおり
        game.bowRoot.position.set(0, 0, 0);
        game.bowRoot.scale.set(1, 1, 1);

        game.camera.fov = 70;
      }

      game.camera.updateProjectionMatrix();
    }

    function createBowModel() {

      // --------------------------------------------------

      function toWorld(local) {

          .applyEuler(new THREE.Euler(0, bowTiltY, 0, "XYZ"))

      // --------------------------------------------------
      // リム中心線
      // 返りのある現代リカーブ風
      // --------------------------------------------------
      function createUpperLimbCurve(draw = 0, kick = 0, stringLocals = null) {
        const locals = stringLocals ?? getStringLocals(draw, kick);

        // 先端は弦端に接続したまま
        const tipTarget = locals.topLocal.clone();

        // 傾き方向は「矢と弦の接続点」
        const bendTarget = locals.midLocal.clone();

        // 根元は固定
        const root = new THREE.Vector3(0.000, 0.286, -0.002);

        // 傾き方向は root → midLocal
        const bendDir = bendTarget.clone().sub(root).normalize();

        // tip接続用の方向は別で持つ
        const tipDir = tipTarget.clone().sub(root).normalize();

        const flex = draw * 0.062 + kick * 0.022;
        const tiltVec = bendDir.clone().multiplyScalar(flex * 0.95);

        // 形状だけ自然なラインへ調整
        const p1 = new THREE.Vector3(0.004, 0.334, 0.004);
        const p2 = new THREE.Vector3(0.008, 0.428, 0.012);
        const p3 = new THREE.Vector3(0.013, 0.525, 0.024);
        const p4 = new THREE.Vector3(0.016, 0.622, 0.040);
        const p5 = new THREE.Vector3(0.015, 0.715, 0.060);
        const p6 = new THREE.Vector3(0.008, 0.804, 0.086);

        // 根元から先端へだんだん大きく、midLocal方向へ傾ける
        p1.addScaledVector(tiltVec, 0.10);
        p2.addScaledVector(tiltVec, 0.24);
        p3.addScaledVector(tiltVec, 0.42);
        p4.addScaledVector(tiltVec, 0.62);
        p5.addScaledVector(tiltVec, 0.82);
        p6.addScaledVector(tiltVec, 1.00);

        // 先端側だけは弦端接続に向けて少し戻す
        p5.addScaledVector(tipDir, flex * 0.03);
        p6.addScaledVector(tipDir, flex * 0.05);

        // tip直前の折れを防ぐ
        p6.x = THREE.MathUtils.lerp(p6.x, tipTarget.x, 0.08);
        p6.y = THREE.MathUtils.lerp(p6.y, tipTarget.y, 0.04);
        p6.z = THREE.MathUtils.lerp(p6.z, tipTarget.z, 0.08);

        return new THREE.CatmullRomCurve3([
          root, p1, p2, p3, p4, p5, p6, tipTarget
        ]);
      }

      function createLowerLimbCurve(draw = 0, kick = 0, stringLocals = null) {
        const locals = stringLocals ?? getStringLocals(draw, kick);

        const tipTarget = locals.botLocal.clone();
        const bendTarget = locals.midLocal.clone();

        const root = new THREE.Vector3(0.000, -0.286, -0.002);

        const bendDir = bendTarget.clone().sub(root).normalize();
        const tipDir = tipTarget.clone().sub(root).normalize();

        const flex = draw * 0.062 + kick * 0.022;
        const tiltVec = bendDir.clone().multiplyScalar(flex * 0.95);

        // 上側と対称になるように形状だけ調整
        const p1 = new THREE.Vector3(0.004, -0.334, 0.004);
        const p2 = new THREE.Vector3(0.008, -0.428, 0.012);
        const p3 = new THREE.Vector3(0.013, -0.525, 0.024);
        const p4 = new THREE.Vector3(0.016, -0.622, 0.040);
        const p5 = new THREE.Vector3(0.015, -0.715, 0.060);
        const p6 = new THREE.Vector3(0.008, -0.804, 0.086);

        p1.addScaledVector(tiltVec, 0.10);
        p2.addScaledVector(tiltVec, 0.24);
        p3.addScaledVector(tiltVec, 0.42);
        p4.addScaledVector(tiltVec, 0.62);
        p5.addScaledVector(tiltVec, 0.82);
        p6.addScaledVector(tiltVec, 1.00);

        p5.addScaledVector(tipDir, flex * 0.03);
        p6.addScaledVector(tipDir, flex * 0.05);

        p6.x = THREE.MathUtils.lerp(p6.x, tipTarget.x, 0.08);
        p6.y = THREE.MathUtils.lerp(p6.y, tipTarget.y, 0.04);
        p6.z = THREE.MathUtils.lerp(p6.z, tipTarget.z, 0.08);

        return new THREE.CatmullRomCurve3([
          root, p1, p2, p3, p4, p5, p6, tipTarget
        ]);
      }

      // --------------------------------------------------
      // リム断面: 根元太く・平べったく、先端へ細く
      // --------------------------------------------------
      function createTaperedLimbGeometry(curve) {
        const tubularSegments = 72;
        const radialSegments = 18;

        const frames = curve.computeFrenetFrames(tubularSegments, false);
        const positions = [];
        const normals = [];
        const uvs = [];
        const indices = [];

        for (let i = 0; i <= tubularSegments; i++) {
          const t = i / tubularSegments;
          const p = curve.getPointAt(t);

          const n = frames.normals[i].clone().normalize();
          const b = frames.binormals[i].clone().normalize();

          // 根元: 幅広で厚め / 先端: 細く薄い
          const width = THREE.MathUtils.lerp(0.050, 0.011, t);
          const thickness = THREE.MathUtils.lerp(0.0085, 0.0032, t);

          for (let j = 0; j < radialSegments; j++) {
            const a = (j / radialSegments) * Math.PI * 2;
            const rx = Math.cos(a) * width;
            const ry = Math.sin(a) * thickness;

            const pos = new THREE.Vector3()
              .copy(p)
              .addScaledVector(n, rx)
              .addScaledVector(b, ry);

            positions.push(pos.x, pos.y, pos.z);

            const normal = new THREE.Vector3()
              .copy(n).multiplyScalar(Math.cos(a))
              .addScaledVector(b, Math.sin(a))
              .normalize();
            normals.push(normal.x, normal.y, normal.z);

            uvs.push(j / radialSegments, t);
          }
        }

        for (let i = 0; i < tubularSegments; i++) {
          for (let j = 0; j < radialSegments; j++) {
            const a = i * radialSegments + j;
            const b = i * radialSegments + ((j + 1) % radialSegments);
            const c = (i + 1) * radialSegments + j;
            const d = (i + 1) * radialSegments + ((j + 1) % radialSegments);

            indices.push(a, c, b);
            indices.push(b, c, d);
          }
        }

        const geo = new THREE.BufferGeometry();
        geo.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
        geo.setAttribute("normal", new THREE.Float32BufferAttribute(normals, 3));
        geo.setAttribute("uv", new THREE.Float32BufferAttribute(uvs, 2));
        geo.setIndex(indices);
        geo.computeBoundingSphere();
        return geo;
      }

      // --------------------------------------------------
      // riser 外形
      // --------------------------------------------------
      function createRiserShape() {
        const s = new THREE.Shape();

        // --------------------------------------------------
        // メンテしやすいように、外形を「点列」で定義する
        // 頂点を増減するだけでシルエット調整できる
        // --------------------------------------------------
        const points = [
          // 開始: 左下
          new THREE.Vector2(-0.040, -0.430),

          // -----------------------------
          // 腹側（弦を引く側）
          // -----------------------------

          new THREE.Vector2(-0.062, -0.402),
        
          new THREE.Vector2(-0.060, -0.350),
          new THREE.Vector2(-0.050, -0.305),
          new THREE.Vector2(-0.040, -0.245),
          new THREE.Vector2(-0.030, -0.185),
          new THREE.Vector2(-0.020, -0.120),

          // グリップ付近のえぐれ
          new THREE.Vector2(-0.010, -0.070),
          new THREE.Vector2(-0.010, -0.020),
          new THREE.Vector2(-0.010,  0.030),
          new THREE.Vector2(-0.010,  0.108),

          // 上側へ
          new THREE.Vector2(-0.020,  0.150),
          new THREE.Vector2(-0.030,  0.215),
          new THREE.Vector2(-0.040,  0.275),
          new THREE.Vector2(-0.050,  0.335),
          new THREE.Vector2(-0.060,  0.384),

          // 上端の面取り
          new THREE.Vector2(0.010, 0.418),

          // -----------------------------
          // 背中側（矢を放つ側）
          // -----------------------------
          new THREE.Vector2(0.026, 0.385),
          new THREE.Vector2(0.066, 0.320),
          new THREE.Vector2(0.084, 0.230),
          new THREE.Vector2(0.096, 0.120),

          new THREE.Vector2(0.096, -0.140),
          new THREE.Vector2(0.084, -0.250),
          new THREE.Vector2(0.066, -0.340),
          new THREE.Vector2(0.026, -0.400),

          // 下端を閉じる
          new THREE.Vector2(0.010, -0.430)
        ];

        s.moveTo(points[0].x, points[0].y);

        for (let i = 1; i < points.length; i++) {
          s.lineTo(points[i].x, points[i].y);
        }

        s.closePath();
        return s;
      }

      function createRiserMesh() {
        const riserGroup = new THREE.Group();

        const fullDepth = 0.06;
        const insetDepth = 0.030;

        const frontZ = fullDepth;
        const backZ = 0.0;
        const recessedBackZ = backZ + insetDepth;

        const baseMat = riserMaterial.clone();
        const wallMat = riserMaterial.clone();

        baseMat.side = THREE.DoubleSide;
        wallMat.side = THREE.DoubleSide;

        // --------------------------------------------------
        // 1) 前面
        // --------------------------------------------------
        const frontShape = createRiserShape();
        const frontGeo = new THREE.ShapeGeometry(frontShape, 128);
        const frontMesh = new THREE.Mesh(frontGeo, baseMat);
        frontMesh.position.z = frontZ;
        riserGroup.add(frontMesh);

        // --------------------------------------------------
        // 2) 外周側壁
        // くぼみ帯の左右だけ奥側を recessedBackZ にする
        // --------------------------------------------------
        const outerWall = createMatchedOuterWall(
          frontZ,
          backZ,
          recessedBackZ,
          wallMat
        );
        riserGroup.add(outerWall);

        // --------------------------------------------------
        // 3) 背面上部
        // --------------------------------------------------
        const backTopShape = createBackTopShape();
        const backTopGeo = new THREE.ShapeGeometry(backTopShape, 128);
        const backTopMesh = new THREE.Mesh(backTopGeo, wallMat);
        backTopMesh.position.z = backZ;
        riserGroup.add(backTopMesh);

        // --------------------------------------------------
        // 4) 背面下部
        // --------------------------------------------------
        const backBottomShape = createBackBottomShape();
        const backBottomGeo = new THREE.ShapeGeometry(backBottomShape, 128);
        const backBottomMesh = new THREE.Mesh(backBottomGeo, wallMat);
        backBottomMesh.position.z = backZ;
        riserGroup.add(backBottomMesh);

        // --------------------------------------------------
        // 5) くぼみ底面
        // --------------------------------------------------
        const recessShape = createRecessBandShape();
        const recessGeo = new THREE.ShapeGeometry(recessShape, 128);
        const recessMesh = new THREE.Mesh(recessGeo, wallMat);
        recessMesh.position.z = recessedBackZ;
        riserGroup.add(recessMesh);

        // --------------------------------------------------
        // 6) くぼみ上端・下端の段差壁
        // --------------------------------------------------
        riserGroup.add(createQuadWall(
          new THREE.Vector2(-0.030, 0.280),
          new THREE.Vector2( 0.060, 0.280),
          backZ,
          recessedBackZ,
          wallMat
        ));

        riserGroup.add(createQuadWall(
          new THREE.Vector2(-0.018, 0.000),
          new THREE.Vector2( 0.082, 0.000),
          recessedBackZ,
          backZ,
          wallMat
        ));

        // --------------------------------------------------
        // 8) グラデーション復活
        // --------------------------------------------------
        applyVerticalGradientToGroup(riserGroup);

        // --------------------------------------------------
        // 9) 中央へ寄せて縮小
        // --------------------------------------------------
        const box = new THREE.Box3().setFromObject(riserGroup);
        const center = box.getCenter(new THREE.Vector3());

        riserGroup.position.sub(center);
        riserGroup.scale.set(0.78, 0.78, 1.0);

        return riserGroup;
      }

      function createMatchedOuterWall(frontZ, backZ, recessedBackZ, material) {
        const positions = [];

        // --------------------------------------------------
        // 外周輪郭を、
        // 5) くぼみ底面
        // 6) 上端・下端段差壁
        // の頂点に合わせて分割した点列
        // --------------------------------------------------
        const points = [
          // 下側通常部
          new THREE.Vector2(-0.040, -0.430),
          new THREE.Vector2(-0.062, -0.402),
          new THREE.Vector2(-0.060, -0.350),
          new THREE.Vector2(-0.050, -0.305),
          new THREE.Vector2(-0.040, -0.245),
          new THREE.Vector2(-0.030, -0.185),
          new THREE.Vector2(-0.020, -0.120),
          new THREE.Vector2(-0.010, -0.070),
          new THREE.Vector2(-0.010, -0.020),

          // --------------------------------------------------
          // 下端段差壁との一致点
          // createQuadWall(
          //   (-0.018, 0.000) -> (0.082, 0.000),
          //   recessedBackZ -> backZ
          // )
          // --------------------------------------------------
          new THREE.Vector2(-0.018, 0.000),

          // 左側 recess 側壁区間
          new THREE.Vector2(-0.012, 0.040),
          new THREE.Vector2(-0.010, 0.080),
          new THREE.Vector2(-0.010, 0.120),
          new THREE.Vector2(-0.014, 0.170),
          new THREE.Vector2(-0.022, 0.220),

          // --------------------------------------------------
          // 上端段差壁との一致点
          // createQuadWall(
          //   (-0.030, 0.280) -> (0.060, 0.280),
          //   backZ -> recessedBackZ
          // )
          // --------------------------------------------------
          new THREE.Vector2(-0.030, 0.280),

          // 上側通常部
          new THREE.Vector2(-0.040, 0.275),
          new THREE.Vector2(-0.050, 0.335),
          new THREE.Vector2(-0.060, 0.384),
          new THREE.Vector2( 0.010, 0.418),
          new THREE.Vector2( 0.026, 0.385),
          new THREE.Vector2( 0.066, 0.320),

          // --------------------------------------------------
          // 上端段差壁の右端一致点
          // --------------------------------------------------
          new THREE.Vector2(0.060, 0.280),

          // 右側 recess 側壁区間
          new THREE.Vector2(0.072, 0.230),
          new THREE.Vector2(0.082, 0.170),
          new THREE.Vector2(0.088, 0.110),
          new THREE.Vector2(0.088, 0.050),

          // --------------------------------------------------
          // 下端段差壁の右端一致点
          // --------------------------------------------------
          new THREE.Vector2(0.082, 0.000),

          // 右下通常部
          new THREE.Vector2(0.096, -0.140),
          new THREE.Vector2(0.084, -0.250),
          new THREE.Vector2(0.066, -0.340),
          new THREE.Vector2(0.026, -0.400),
          new THREE.Vector2(0.010, -0.430)
        ];

        // --------------------------------------------------
        // recessedBackZ に落とす点
        // 5) createRecessBandShape() の輪郭
        // 6) createQuadWall() の接続点
        // に一致させる
        // --------------------------------------------------
        function isRecessPoint(p) {
          return (
            // 左側 recess
            (Math.abs(p.x - (-0.018)) < 1e-6 && Math.abs(p.y - 0.000) < 1e-6) ||
            (Math.abs(p.x - (-0.012)) < 1e-6 && Math.abs(p.y - 0.040) < 1e-6) ||
            (Math.abs(p.x - (-0.010)) < 1e-6 && Math.abs(p.y - 0.080) < 1e-6) ||
            (Math.abs(p.x - (-0.010)) < 1e-6 && Math.abs(p.y - 0.120) < 1e-6) ||
            (Math.abs(p.x - (-0.014)) < 1e-6 && Math.abs(p.y - 0.170) < 1e-6) ||
            (Math.abs(p.x - (-0.022)) < 1e-6 && Math.abs(p.y - 0.220) < 1e-6) ||
            (Math.abs(p.x - (-0.030)) < 1e-6 && Math.abs(p.y - 0.280) < 1e-6) ||

            // 上端右端
            (Math.abs(p.x - 0.060) < 1e-6 && Math.abs(p.y - 0.280) < 1e-6) ||

            // 右側 recess
            (Math.abs(p.x - 0.072) < 1e-6 && Math.abs(p.y - 0.230) < 1e-6) ||
            (Math.abs(p.x - 0.082) < 1e-6 && Math.abs(p.y - 0.170) < 1e-6) ||
            (Math.abs(p.x - 0.088) < 1e-6 && Math.abs(p.y - 0.110) < 1e-6) ||
            (Math.abs(p.x - 0.088) < 1e-6 && Math.abs(p.y - 0.050) < 1e-6) ||
            (Math.abs(p.x - 0.082) < 1e-6 && Math.abs(p.y - 0.000) < 1e-6)
          );
        }

        function getBackZForPoint(p) {
          return isRecessPoint(p) ? recessedBackZ : backZ;
        }

        for (let i = 0; i < points.length; i++) {
          const a = points[i];
          const b = points[(i + 1) % points.length];

          const aBackZ = getBackZForPoint(a);
          const bBackZ = getBackZForPoint(b);

          positions.push(
            a.x, a.y, aBackZ,
            b.x, b.y, bBackZ,
            a.x, a.y, frontZ,

            b.x, b.y, bBackZ,
            b.x, b.y, frontZ,
            a.x, a.y, frontZ
          );
        }

        const geom = new THREE.BufferGeometry();
        geom.setAttribute(
          "position",
          new THREE.BufferAttribute(new Float32Array(positions), 3)
        );
        geom.computeVertexNormals();

        return new THREE.Mesh(geom, material);
      }

      function applyVerticalGradientToGroup(group) {
        const box = new THREE.Box3().setFromObject(group);
        const minY = box.min.y;
        const maxY = box.max.y;
        const halfH = Math.max(Math.abs(minY), Math.abs(maxY));

        const centerColor = new THREE.Color(0xcfd4db);
        const edgeColor = new THREE.Color(0x121418);

        group.updateMatrixWorld(true);

        group.traverse(obj => {
          if (!obj.isMesh || !obj.geometry?.attributes?.position) return;

          const pos = obj.geometry.attributes.position;
          const colors = [];

          for (let i = 0; i < pos.count; i++) {
            const local = new THREE.Vector3(
              pos.getX(i),
              pos.getY(i),
              pos.getZ(i)
            );

            const world = local.clone().applyMatrix4(obj.matrixWorld);

            let t = Math.abs(world.y) / halfH;
            t = THREE.MathUtils.clamp(Math.pow(t, 0.85), 0, 1);

            const c = centerColor.clone().lerp(edgeColor, t);
            colors.push(c.r, c.g, c.b);
          }

          obj.geometry.setAttribute(
            "color",
            new THREE.Float32BufferAttribute(colors, 3)
          );

          obj.material = obj.material.clone();
          obj.material.vertexColors = true;
        });
      }

      function createQuadWall(p1, p2, z1, z2, material) {
        const positions = new Float32Array([
          p1.x, p1.y, z1,
          p2.x, p2.y, z1,
          p1.x, p1.y, z2,

          p2.x, p2.y, z1,
          p2.x, p2.y, z2,
          p1.x, p1.y, z2
        ]);

        const geom = new THREE.BufferGeometry();
        geom.setAttribute("position", new THREE.BufferAttribute(positions, 3));
        geom.computeVertexNormals();

        return new THREE.Mesh(geom, material);
      }

      function createRecessBandShape() {
        const s = new THREE.Shape();

        // --------------------------------------------------

        s.moveTo(points[0].x, points[0].y);

        for (let i = 1; i < points.length; i++) {

        s.closePath();
        return s;
      }

      // --------------------------------------------------

      // limb pocket（接続部を自然に）
      function createLimbPocket(localY, isUpper) {
        const g = new THREE.Group();

      riserGroup.add(createLimbPocket(0.255, -0.20));

      // --------------------------------------------------
      // limb tip
      // --------------------------------------------------
      function createTipMesh() {
        const g = new THREE.Group();

        const cap = new THREE.Mesh(
          new THREE.CapsuleGeometry(0.011, 0.032, 5, 12),
          darkDetailMaterial
        );
        cap.rotation.z = Math.PI / 2;
        g.add(cap);

        const groove = new THREE.Mesh(
          new THREE.BoxGeometry(0.010, 0.006, 0.014),
          detailMaterial
        );
        groove.position.set(0.012, 0, 0);
        g.add(groove);

        // tipグループ原点から見た「弦がかかる位置」
        g.userData.grooveLocal = groove.position.clone();

        return g;
      }

      const upperTip = createTipMesh();
      const lowerTip = createTipMesh();
      tipGroup.add(upperTip);
      tipGroup.add(lowerTip);

      function updateTipTransform(tipMesh, curve, isUpper) {
        const t = isUpper ? 1 : 0;
        const sampleT = isUpper ? 0.985 : 0.015;

        const localPos = curve.getPointAt(t);
        const tangent = (
          isUpper
            ? curve.getPointAt(t).clone().sub(curve.getPointAt(sampleT))
            : curve.getPointAt(sampleT).clone().sub(curve.getPointAt(t))
        ).normalize();

        const worldPos = toWorld(localPos);
        const worldTarget = toWorld(localPos.clone().add(tangent));

        const m = new THREE.Matrix4().lookAt(
          worldPos,
          worldTarget,
          new THREE.Vector3(0, 1, 0)
        );

        const q = new THREE.Quaternion()
          .setFromRotationMatrix(m)
          .multiply(new THREE.Quaternion().setFromEuler(
            new THREE.Euler(0, Math.PI / 2, 0)
          ));

        tipMesh.quaternion.copy(q);

        // groove のローカル位置を回転後のワールド方向へ変換
        const grooveLocal = (tipMesh.userData.grooveLocal ?? new THREE.Vector3(0, 0, 0)).clone();
        const grooveWorldOffset = grooveLocal.applyQuaternion(q);

        // groove が limb先端(localPos) に一致するように、tip本体を逆オフセット
        tipMesh.position.copy(worldPos.clone().sub(grooveWorldOffset));
      }

      // --------------------------------------------------
      // 弦のローカル基準点
      // --------------------------------------------------
      function getStringLocals(draw = 0, kick = 0) {
        const flex = draw * 0.045 + kick * 0.025;

        // 矢を引いた時の弦の先端の移動量（前方向）
        const tipForward = flex * 1.00;

        // 矢を引いた時の弦の横方向の移動量（左右）
        const tipSide = flex * 0.00;

        // 追加: 矢を引いた時の弦端の上下移動量
        // 上側は下へ、下側は上へ
        const topTipDown = draw * 0.050;
        const bottomTipUp = draw * 0.030;

        // 弦を左へ移動させるオフセット（値を大きくすると左へ）
        const stringLeftOffset = 0.08;

        // 弦を手前へ移動させるオフセット（値を大きくすると手前へ）
        const stringForwardOffset = 0.10;

        // 弦全体を上下に移動させるオフセット
        const stringUpOffset = 0.05;

        // 弦の上下長を短くする量（値を大きくすると短くなる）
        const stringShorten = 0.10;

        const baseTopLocal = new THREE.Vector3(
          0.002 + tipSide * 0.08 - stringLeftOffset,
          bowHalfLen + stringUpOffset,
          0.146 + tipForward * 0.96 + stringForwardOffset
        );

        const baseBotLocal = new THREE.Vector3(
          0.002 + tipSide * 0.08 - stringLeftOffset,
          -bowHalfLen + stringUpOffset,
          0.146 + tipForward * 0.96 + stringForwardOffset
        );

        const straightMid = baseTopLocal.clone().lerp(baseBotLocal, 0.5);

        const topLocal = baseTopLocal.clone();
        const botLocal = baseBotLocal.clone();

        // 既存の上下短縮
        topLocal.y -= stringShorten;
        botLocal.y += stringShorten;

        // 追加: draw時の上下変位
        topLocal.y -= topTipDown;
        botLocal.y += bottomTipUp;

        const loadedArrowDrawDirLocal = new THREE.Vector3(0, 0, -1)
          .applyEuler(new THREE.Euler(0, -0.30, 0, "XYZ"))
          .normalize();

        const midLocal = straightMid.clone().sub(
          loadedArrowDrawDirLocal.clone().multiplyScalar(draw * maxDraw)
        );

        return { topLocal, midLocal, botLocal };
      }

      // --------------------------------------------------
      // 弦
      // --------------------------------------------------
      const initLocals = getStringLocals(0, 0);

      const stringGeo = new THREE.BufferGeometry().setFromPoints([
        toWorld(initLocals.topLocal),
        toWorld(initLocals.midLocal),
        toWorld(initLocals.botLocal)
      ]);

      const string = new THREE.Line(stringGeo, stringMaterial);
      bowGroup.add(string);

      // --------------------------------------------------

      // --------------------------------------------------
